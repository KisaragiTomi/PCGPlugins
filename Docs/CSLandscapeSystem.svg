<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="1640" viewBox="0 0 1340 1640" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="modCSG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3320"/><stop offset="1" stop-color="#4a4126"/>
    </linearGradient>
    <linearGradient id="modGSE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f3a2e"/><stop offset="1" stop-color="#24493a"/>
    </linearGradient>
    <linearGradient id="modPEP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22304a"/><stop offset="1" stop-color="#2a3c5e"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d2a55"/><stop offset="1" stop-color="#4a3268"/>
    </linearGradient>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7d8590"/>
    </marker>
    <style>
      .h1{fill:#e6edf3;font-size:26px;font-weight:700}
      .h2{fill:#f0f6fc;font-size:16px;font-weight:700}
      .lab2{fill:#8b949e;font-size:11.5px}
      .code{fill:#79c0ff;font-size:12.5px;font-family:Consolas,monospace}
      .codeY{fill:#e3b341;font-size:12.5px;font-family:Consolas,monospace}
      .codeG{fill:#7ee787;font-size:12.5px;font-family:Consolas,monospace}
      .tag{font-size:11px;font-weight:700;letter-spacing:1px}
      .white{fill:#f0f6fc;font-size:13.5px;font-weight:600}
    </style>
  </defs>

  <rect width="1340" height="1640" fill="url(#bg)"/>
  <text x="40" y="48" class="h1">CS Landscape Edit System</text>
  <text x="40" y="72" class="lab2">PCGPlugins - three editor layers unified under ACSLandscapeEditLayerBase</text>

  <!-- ComputeShaderGenerator module -->
  <rect x="40" y="100" width="1260" height="172" rx="10" fill="url(#modCSG)" stroke="#6e5a22" stroke-width="1.5"/>
  <text x="60" y="128" class="tag" fill="#e3b341">MODULE - ComputeShaderGenerator (shared / GPU compute)</text>
  <text x="60" y="150" class="lab2">depended on by upper layers - no reverse deps - holds shared struct, enum and compute dispatch</text>

  <rect x="60" y="166" width="300" height="88" rx="8" fill="#1c1208" stroke="#6e5a22"/>
  <text x="78" y="190" class="white">FCSReadLandscapeData</text>
  <text x="78" y="212" class="lab2">single landscape read struct</text>
  <text x="78" y="232" class="codeY">heightmap / weights / bounds / res</text>

  <rect x="382" y="166" width="330" height="88" rx="8" fill="#1c1208" stroke="#6e5a22"/>
  <text x="400" y="190" class="white">enum ECSLandscapeBlendMode</text>
  <text x="400" y="210" class="codeY">Alpha=0  Override=1  Additive=2</text>
  <text x="400" y="230" class="codeY">Subtract=3  Multiply=4  MaterialDrive=5</text>

  <rect x="734" y="166" width="546" height="88" rx="8" fill="#1c1208" stroke="#6e5a22"/>
  <text x="752" y="190" class="white">ComputeShaderBasicFunction.h  /  CSLandscape.usf</text>
  <text x="752" y="212" class="lab2">struct + enum defined here - USF matches BlendMode by integer branch</text>
  <text x="752" y="232" class="codeG">GPU dispatch -&gt; RenderTarget (height / weight result)</text>

  <!-- GeometryScriptExtraEditor module -->
  <rect x="40" y="296" width="1260" height="92" rx="10" fill="url(#modGSE)" stroke="#2c5a44" stroke-width="1.5"/>
  <text x="60" y="324" class="tag" fill="#3fb950">MODULE - GeometryScriptExtraEditor</text>
  <text x="60" y="346" class="lab2">depends on ComputeShaderGenerator - LandscapeExtra.h includes ComputeShaderBasicFunction.h</text>
  <text x="60" y="372" class="codeG">CreateLandscapeTextureData() / CreateLandscapeMeshTextureData()  -&gt; return FCSReadLandscapeData</text>

  <line x1="120" y1="296" x2="120" y2="274" stroke="#3fb950" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="130" y="288" class="lab2" fill="#3fb950">depends on</text>

  <!-- PCGEditorProcess module -->
  <rect x="40" y="412" width="1260" height="1190" rx="10" fill="url(#modPEP)" stroke="#2c4670" stroke-width="1.5"/>
  <text x="60" y="440" class="tag" fill="#58a6ff">MODULE - PCGEditorProcess (three editor actor layers)</text>
  <text x="60" y="462" class="lab2">depends on ComputeShaderGenerator - all actors implement ILandscapeEditLayerRenderer</text>
  <line x1="180" y1="412" x2="180" y2="388" stroke="#3fb950" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- base class -->
  <rect x="300" y="492" width="740" height="252" rx="10" fill="url(#base)" stroke="#7c5cb0" stroke-width="2"/>
  <text x="320" y="520" class="h2">ACSLandscapeEditLayerBase   (abstract base - Public)</text>
  <text x="320" y="540" class="lab2">implements ILandscapeEditLayerRenderer - friend UCSLandscapeEditLayer</text>

  <rect x="320" y="554" width="340" height="172" rx="8" fill="#241634" stroke="#6b4f9c"/>
  <text x="338" y="576" class="white">sunk shared capability</text>
  <text x="338" y="598" class="code">OwnedEditLayerGuid - bHasResult</text>
  <text x="338" y="618" class="code">FindLandscape() / RequestLandscapeUpdate()</text>
  <text x="338" y="638" class="code">EnsureEditLayer()  unified hookup</text>
  <text x="338" y="658" class="code">RemoveEditLayer() - lifecycle cleanup</text>
  <text x="338" y="678" class="code">4x renderer boilerplate</text>
  <text x="338" y="700" class="code">BakeResultToLandscape() -&gt; persist idx 0</text>

  <rect x="676" y="554" width="348" height="172" rx="8" fill="#241634" stroke="#6b4f9c"/>
  <text x="694" y="576" class="white">virtual hooks (per subclass)</text>
  <text x="694" y="600" class="codeY">virtual ShouldSupportHeightmap()</text>
  <text x="694" y="620" class="codeY">virtual IsLayerEnabledForMerge()</text>
  <text x="694" y="640" class="codeY">virtual RenderLayer()   // per layer</text>
  <text x="694" y="672" class="lab2">base does not implement RenderLayer;</text>
  <text x="694" y="692" class="lab2">each layer provides generate / blend logic</text>

  <!-- inheritance bus -->
  <line x1="670" y1="744" x2="670" y2="778" stroke="#a371f7" stroke-width="2"/>
  <line x1="230" y1="778" x2="1110" y2="778" stroke="#a371f7" stroke-width="2"/>
  <line x1="230" y1="778" x2="230" y2="818" stroke="#a371f7" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="778" x2="670" y2="818" stroke="#a371f7" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1110" y1="778" x2="1110" y2="818" stroke="#a371f7" stroke-width="2" marker-end="url(#arr)"/>
  <text x="700" y="770" class="lab2" fill="#a371f7">inherits (is-a)</text>

  <!-- subclass: ACSLandscape -->
  <rect x="70" y="822" width="320" height="200" rx="10" fill="#10243a" stroke="#2c4670" stroke-width="1.5"/>
  <text x="88" y="848" class="white">ACSLandscape</text>
  <text x="88" y="868" class="lab2">main heightmap layer</text>
  <text x="88" y="892" class="codeY">override ShouldSupportHeightmap()</text>
  <text x="88" y="910" class="lab2">  -&gt; bAffectHeightmap</text>
  <text x="88" y="932" class="code">override RenderLayer()</text>
  <text x="88" y="954" class="code">CommitToLandscape()</text>
  <text x="88" y="972" class="lab2">  -&gt; BakeResultToLandscape()</text>
  <text x="88" y="998" class="codeG">subclassed by  ACSLandscapeRiver</text>

  <!-- ACSLandscapeRiver -->
  <rect x="70" y="1042" width="320" height="86" rx="10" fill="#0e1c2c" stroke="#22405f" stroke-width="1.2"/>
  <text x="88" y="1068" class="white">ACSLandscapeRiver</text>
  <text x="88" y="1090" class="lab2">extends ACSLandscape</text>
  <text x="88" y="1110" class="lab2">river-specific generate logic stays in subclass</text>
  <line x1="230" y1="1022" x2="230" y2="1042" stroke="#a371f7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- subclass: ACSLandscapeTempLayer -->
  <rect x="510" y="822" width="320" height="200" rx="10" fill="#10243a" stroke="#2c4670" stroke-width="1.5"/>
  <text x="528" y="848" class="white">ACSLandscapeTempLayer</text>
  <text x="528" y="868" class="lab2">temporary / preview layer</text>
  <text x="528" y="892" class="codeY">override IsLayerEnabledForMerge()</text>
  <text x="528" y="910" class="lab2">  -&gt; true</text>
  <text x="528" y="932" class="code">override RenderLayer()</text>
  <text x="528" y="954" class="code">CommitToLandscape()</text>
  <text x="528" y="972" class="lab2">  -&gt; BakeResultToLandscape()</text>
  <text x="528" y="998" class="lab2">uses base unified hookup</text>

  <!-- subclass: ACSLandscapeLayer -->
  <rect x="950" y="822" width="320" height="200" rx="10" fill="#10243a" stroke="#2c4670" stroke-width="1.5"/>
  <text x="968" y="848" class="white">ACSLandscapeLayer</text>
  <text x="968" y="868" class="lab2">general edit layer</text>
  <text x="968" y="892" class="code">override RenderLayer()</text>
  <text x="968" y="914" class="lab2">dropped old LayerGuid / LayerIndex /</text>
  <text x="968" y="932" class="lab2">bLayerCreated mechanism</text>
  <text x="968" y="954" class="code">CreateLandscapeLayer()</text>
  <text x="968" y="974" class="code">RemoveLandscapeLayer()</text>
  <text x="968" y="996" class="lab2">BP API delegating to base</text>

  <!-- bridge UObject -->
  <rect x="300" y="1170" width="740" height="120" rx="10" fill="#2a1d33" stroke="#7c5cb0" stroke-width="1.5"/>
  <text x="320" y="1198" class="white">UCSLandscapeEditLayer   (bridge UObject)</text>
  <text x="320" y="1222" class="lab2">reverse lookup simplified: iterate single base type ACSLandscapeEditLayerBase</text>
  <text x="320" y="1244" class="code">friend access -&gt; OwnedEditLayerGuid</text>
  <text x="320" y="1268" class="lab2">routes engine edit-layer callbacks back to the owning actor</text>

  <!-- runtime / commit target -->
  <rect x="300" y="1330" width="740" height="120" rx="10" fill="#0f2a1c" stroke="#2c5a44" stroke-width="1.5"/>
  <text x="320" y="1358" class="white">ALandscape   (engine - persistent edit layers)</text>
  <text x="320" y="1382" class="codeG">BakeResultToLandscape()  commits RT result to persistent layer index 0</text>
  <text x="320" y="1406" class="lab2">EnsureEditLayer adds / finds the owned edit layer by OwnedEditLayerGuid</text>
  <text x="320" y="1430" class="lab2">RequestLandscapeUpdate triggers re-merge of the edit-layer stack</text>

  <!-- arrows from subclasses to bridge -->
  <line x1="230" y1="1128" x2="230" y2="1210" stroke="#7d8590" stroke-width="1.6"/>
  <line x1="230" y1="1210" x2="298" y2="1210" stroke="#7d8590" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="670" y1="1022" x2="670" y2="1168" stroke="#7d8590" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="1110" y1="1022" x2="1110" y2="1230" stroke="#7d8590" stroke-width="1.6"/>
  <line x1="1110" y1="1230" x2="1042" y2="1230" stroke="#7d8590" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="690" y="1100" class="lab2" fill="#8b949e">register / callback</text>

  <!-- bridge to landscape -->
  <line x1="670" y1="1290" x2="670" y2="1328" stroke="#3fb950" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="690" y="1316" class="lab2" fill="#3fb950">commit / update</text>

  <!-- data flow note -->
  <rect x="40" y="1486" width="1260" height="96" rx="10" fill="#11161d" stroke="#30363d" stroke-width="1.2"/>
  <text x="60" y="1512" class="white">Data flow</text>
  <text x="60" y="1536" class="lab2">CreateLandscape*TextureData -&gt; FCSReadLandscapeData -&gt; Compute Shader (BlendMode) -&gt; RenderTarget</text>
  <text x="60" y="1558" class="lab2">-&gt; per-layer RenderLayer draws into edit layer -&gt; BakeResultToLandscape commits to ALandscape persistent layer</text>
</svg>