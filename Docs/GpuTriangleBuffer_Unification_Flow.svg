<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1060" viewBox="0 0 1600 1060" role="img" aria-labelledby="title desc">
  <title id="title">GPU 三角形 Buffer 统一数据流</title>
  <desc id="desc">三条 GPU 三角形产出（meshgenerator direct mesh、road、vine）经各自叶子 SceneProxy 汇入共享基类 FCSGpuMeshSceneProxy，再走一处共享 readback/存盘路径产出 UStaticMesh。road 需补 vertex counter，vine 尚无 GPU-resident 叶子。</desc>

  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; }
      .producer { fill: #1e293b; stroke: #94a3b8; stroke-width: 2; }
      .leaf { fill: #312e81; stroke: #a78bfa; stroke-width: 2; }
      .core { fill: url(#core-dot); stroke: #22d3ee; stroke-width: 3; }
      .out { fill: #3b0764; stroke: #c084fc; stroke-width: 2.5; }
      .vine { fill: #422006; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 8 6; }
      .subchip { fill: #04222c; stroke: #0e7490; stroke-width: 1.4; }
      .title { fill: #f8fafc; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .label { fill: #f8fafc; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #e5e7eb; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 14px; }
      .mono { fill: #a5f3fc; font-family: Consolas, "Microsoft YaHei", monospace; font-size: 13.5px; }
      .monoDim { fill: #cbd5e1; font-family: Consolas, "Microsoft YaHei", monospace; font-size: 13px; }
      .muted { fill: #94a3b8; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; font-size: 12.5px; }
      .chip { fill: #020617; stroke: #475569; stroke-width: 1.4; }
      .arrowPurple { stroke: #c4b5fd; stroke-width: 3; fill: none; marker-end: url(#arrowPurple); }
      .arrowCyan { stroke: #67e8f9; stroke-width: 3; fill: none; marker-end: url(#arrowCyan); }
      .arrowAmber { stroke: #fbbf24; stroke-width: 2.6; fill: none; stroke-dasharray: 9 6; marker-end: url(#arrowAmber); }
    </style>

    <pattern id="core-dot" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#083344"/>
      <circle cx="3" cy="3" r="1.25" fill="#22d3ee" opacity="0.3"/>
      <circle cx="9" cy="9" r="1.25" fill="#22d3ee" opacity="0.3"/>
    </pattern>

    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c4b5fd" />
    </marker>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9" />
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fbbf24" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1060" />

  <text class="title" x="42" y="50">GPU 三角形 Buffer 统一数据流</text>
  <text class="subtitle" x="42" y="80">三条产出 → 各自叶子 SceneProxy → 共享基类 → 一处 readback/存盘 → UStaticMesh。青色=共享核心，橙色虚线=vine 缺口。</text>

  <!-- Legend -->
  <rect class="producer" x="1146" y="26" width="22" height="13" rx="3" />
  <text class="muted" x="1174" y="37">产出 / 组件</text>
  <rect class="leaf" x="1146" y="47" width="22" height="13" rx="3" />
  <text class="muted" x="1174" y="58">叶子 SceneProxy</text>
  <rect class="core" x="1356" y="26" width="22" height="13" rx="3" />
  <text class="muted" x="1384" y="37">共享核心（已下沉）</text>
  <rect class="vine" x="1356" y="47" width="22" height="13" rx="3" />
  <text class="muted" x="1384" y="58">vine 缺口（待叶子化）</text>

  <!-- Row 1: producers -->
  <rect class="panel" x="40" y="104" width="1520" height="156" rx="20" />
  <text class="label" x="70" y="134">1. 产出方（游戏线程）</text>

  <rect class="producer" x="70" y="148" width="440" height="100" rx="14" />
  <text class="label" x="92" y="177">meshgenerator direct mesh</text>
  <text class="mono" x="92" y="201">SubmitBoxSceneTrianglesToRenderPipeline()</text>
  <text class="small" x="92" y="223">AComputeShaderMeshGenerator</text>
  <text class="small" x="92" y="242">世界空间 soup · GPU 决定计数</text>

  <rect class="producer" x="560" y="148" width="440" height="100" rx="14" />
  <text class="label" x="582" y="177">road</text>
  <text class="mono" x="582" y="201">URoadMeshComponent</text>
  <text class="small" x="582" y="223">PCGEditorProcess</text>
  <text class="small" x="582" y="242">局部空间 · indexed（V ≠ I）</text>

  <rect class="vine" x="1050" y="148" width="460" height="100" rx="14" />
  <text class="label" x="1072" y="177">vine（缺口）</text>
  <text class="mono" x="1072" y="201">AVineContainer / VVVoxel.usf</text>
  <text class="small" x="1072" y="223">现走 UDynamicMesh + CPU 重算法线</text>
  <text class="small" x="1072" y="242">无 GPU-resident 叶子</text>

  <path class="arrowPurple" d="M290 248 L290 342" />
  <path class="arrowPurple" d="M780 248 L780 342" />
  <path class="arrowAmber"  d="M1280 248 L1280 342" />

  <!-- Row 2: leaf scene proxies -->
  <rect class="panel" x="40" y="300" width="1520" height="168" rx="20" />
  <text class="label" x="70" y="330">2. 叶子 SceneProxy（继承基类，布局字节一致）</text>

  <rect class="leaf" x="70" y="344" width="440" height="112" rx="14" />
  <text class="label" x="92" y="372">FCSDirectTriangleMeshSceneProxy</text>
  <text class="small" x="92" y="394">soup：identity index，V == I</text>
  <text class="mono" x="92" y="417">EnqueueMeshReadback ✓（现有参考实现）</text>
  <text class="small" x="92" y="439">已打通 readback → 存盘</text>

  <rect class="leaf" x="560" y="344" width="440" height="112" rx="14" />
  <text class="label" x="582" y="372">FRoadMeshSceneProxy</text>
  <text class="small" x="582" y="394">indexed：MaxVertices + MaxIndices</text>
  <text class="mono" x="582" y="417">已接入基类 readback ✓</text>
  <text class="small" x="582" y="439">FinalizeCS 持久化 vertex/index 计数</text>

  <rect class="vine" x="1050" y="344" width="460" height="112" rx="14" />
  <text class="label" x="1072" y="372">UVineGpuMeshComponent（待建）</text>
  <text class="small" x="1072" y="394">需新建叶子 + GPU 切线 / 法线 pass</text>
  <text class="small" x="1072" y="417">float4 结构化 buffer 需对齐标准 6-buffer</text>
  <text class="small" x="1072" y="439">计数 CPU 已知（上叶子后最省）</text>

  <path class="arrowCyan"  d="M290 456 L290 548" />
  <path class="arrowCyan"  d="M780 456 L780 548" />
  <path class="arrowAmber" d="M1280 456 L1280 548" />

  <!-- Row 3: shared base (core) -->
  <rect class="panel" x="40" y="508" width="1520" height="212" rx="20" />
  <text class="label" x="70" y="538">3. 共享基类　—　buffer 集 + readback 已下沉（描述符驱动，可扩展）</text>

  <rect class="core" x="70" y="550" width="1440" height="152" rx="16" />
  <text class="label" x="92" y="580">FCSGpuMeshSceneProxy / UCSGpuMeshComponent</text>
  <text class="small" x="92" y="602">现拥有：FLocalVertexFactory · FDrawDesc（direct / DrawIndexedIndirect）</text>

  <rect class="subchip" x="92" y="614" width="212" height="30" rx="6" />
  <text class="monoDim" x="104" y="634">Positions  f×3</text>
  <rect class="subchip" x="320" y="614" width="212" height="30" rx="6" />
  <text class="monoDim" x="332" y="634">Tangents  u×2</text>
  <rect class="subchip" x="548" y="614" width="212" height="30" rx="6" />
  <text class="monoDim" x="560" y="634">TexCoords  f×2</text>
  <rect class="subchip" x="776" y="614" width="212" height="30" rx="6" />
  <text class="monoDim" x="788" y="634">Colors  u</text>
  <rect class="subchip" x="1004" y="614" width="212" height="30" rx="6" />
  <text class="monoDim" x="1016" y="634">Indices  u</text>
  <rect class="subchip" x="1232" y="614" width="256" height="30" rx="6" />
  <text class="monoDim" x="1244" y="634">IndirectArgs ×5</text>

  <text class="mono" x="92" y="668">已在基类：EnqueueCountersReadback + ReadbackMeshSync → FCSGpuMeshCPUData</text>
  <text class="small" x="92" y="690">计数解耦：MeshCounters(2u) 存 VertexCount/IndexCount，顶点流/索引流分别定长</text>

  <path class="arrowCyan" d="M790 702 L790 772" />

  <!-- Row 4: shared save path (core) -->
  <rect class="panel" x="40" y="730" width="1520" height="252" rx="20" />
  <text class="label" x="70" y="760">4. 共享存盘路径　—　一处实现，三方共用</text>

  <rect class="core" x="70" y="774" width="290" height="104" rx="14" />
  <text class="label" x="92" y="804">ReadbackMeshSync</text>
  <text class="small" x="92" y="828">GPU → CPU 精确回读</text>
  <text class="small" x="92" y="850">按 Args[0] 定长</text>

  <rect class="core" x="400" y="774" width="300" height="104" rx="14" />
  <text class="label" x="422" y="804">FCSGpuMeshCPUData</text>
  <text class="small" x="422" y="828">pos / normal / tangent</text>
  <text class="small" x="422" y="850">uv / index</text>

  <rect class="core" x="740" y="774" width="330" height="104" rx="14" />
  <text class="label" x="762" y="804">BuildDirectGPU-</text>
  <text class="label" x="762" y="826">MeshDescription</text>
  <text class="small" x="762" y="850">→ FMeshDescription</text>

  <rect class="core" x="1110" y="774" width="210" height="104" rx="14" />
  <text class="label" x="1132" y="804">CreateStatic-</text>
  <text class="label" x="1132" y="826">MeshAsset</text>
  <text class="small" x="1132" y="850">AssetUtils</text>

  <rect class="out" x="1360" y="774" width="150" height="104" rx="14" />
  <text class="label" x="1382" y="820">UStaticMesh</text>
  <text class="small" x="1382" y="846">存盘资产</text>

  <path class="arrowCyan"   d="M360 826 L400 826" />
  <path class="arrowCyan"   d="M700 826 L740 826" />
  <path class="arrowCyan"   d="M1070 826 L1110 826" />
  <path class="arrowPurple" d="M1320 826 L1360 826" />

  <text class="muted" x="70" y="918">soup（direct）：VertexCount = IndexCount = Args[0]，现有 readback 可原样回读。</text>
  <text class="muted" x="70" y="940">indexed（road）：DrawIndexedIndirect 的 5 个 arg 无顶点数 → build pass 需写入 vertex counter 才能精确回读顶点流。</text>
  <text class="muted" x="70" y="962">空间约定：direct 世界空间需转回本地（bConvertToActorLocalSpace）；road / vine 本地空间不转。</text>

  <text class="muted" x="42" y="1024">要点：渲染侧已由共享基类统一；本次统一的是 readback→存盘——把它从 CSDirect 叶子下沉到基类，road 补 vertex counter，vine 先叶子化。</text>
</svg>
