<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1400" viewBox="0 0 1800 1400" role="img" aria-labelledby="title desc">
  <title id="title">GPU 版 Space Colonization (SC) 流程</title>
  <desc id="desc">展示 GenerateVines.cpp 中 BuildSpaceColonizationQueueCSImpl 与 SpaceColonizationQueue.usf 的 GPU 队列、RDG buffer、迭代生长、轴向平滑、读回和线段输出。</desc>

  <defs>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #172033; }
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .header { fill: #eef7ff; stroke: #bfdbfe; stroke-width: 1.4; }
      .h1 { font-size: 34px; font-weight: 800; }
      .subtitle { font-size: 15px; fill: #52627a; }
      .laneTitle { font-size: 20px; font-weight: 800; fill: #0f172a; }
      .nodeTitle { font-size: 16px; font-weight: 800; fill: #111827; }
      .body { font-size: 13px; fill: #334155; }
      .small { font-size: 12px; fill: #64748b; }
      .tiny { font-size: 11px; fill: #64748b; }
      .mono { font-family: Consolas, "Cascadia Code", monospace; }
      .code { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; fill: #1e3a8a; }
      .codeGreen { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; fill: #065f46; }
      .codeOrange { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; fill: #9a3412; }
      .codePurple { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; fill: #5b21b6; }
      .cpuLane { fill: #f0f9ff; stroke: #7dd3fc; }
      .rdgLane { fill: #ecfdf5; stroke: #6ee7b7; }
      .gpuLane { fill: #fff7ed; stroke: #fdba74; }
      .outLane { fill: #f5f3ff; stroke: #c4b5fd; }
      .cpu { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.7; }
      .rdg { fill: #ccfbf1; stroke: #0f766e; stroke-width: 1.7; }
      .gpu { fill: #fed7aa; stroke: #ea580c; stroke-width: 1.7; }
      .loop { fill: #ffedd5; stroke: #c2410c; stroke-width: 1.7; }
      .out { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.7; }
      .state { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.4; }
      .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 1.4; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .pillBlue { fill: #eff6ff; stroke: #93c5fd; }
      .pillGreen { fill: #ecfdf5; stroke: #86efac; }
      .pillOrange { fill: #fff7ed; stroke: #fdba74; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.3; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #0f766e; stroke-width: 2.3; fill: none; marker-end: url(#arrowGreen); }
      .arrowOrange { stroke: #ea580c; stroke-width: 2.3; fill: none; marker-end: url(#arrowOrange); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 2.3; fill: none; marker-end: url(#arrowPurple); }
      .dash { stroke-dasharray: 8 6; }
      .shadow { filter: url(#shadow); }
    </style>

    <filter id="shadow" x="-6%" y="-6%" width="112%" height="124%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1400"/>

  <rect class="header" x="42" y="28" width="1716" height="94" rx="16"/>
  <text class="h1" x="70" y="67">GPU 版 Space Colonization (SC) 流程</text>
  <text class="subtitle mono" x="72" y="96">GenerateVines.cpp::BuildSpaceColonizationQueueCSImpl()  ->  /Plugin/PCGPlugins/Shaders/Private/SpaceColonizationQueue.usf</text>
  <text class="subtitle" x="1125" y="67">核心：RDG 一次排队，GPU 迭代生长，读回 Target / State / Axis，再构建藤蔓线。</text>
  <text class="subtitle" x="1125" y="96">当前实现：MaxNeighborsPerTarget = 128，AxisA/B 做 3 次 ping-pong 平滑。</text>

  <g transform="translate(58 134)">
    <rect class="cpu" x="0" y="0" width="18" height="18" rx="3"/>
    <text class="small" x="26" y="14">CPU / Game Thread</text>
    <rect class="rdg" x="190" y="0" width="18" height="18" rx="3"/>
    <text class="small" x="216" y="14">RDG buffer</text>
    <rect class="gpu" x="350" y="0" width="18" height="18" rx="3"/>
    <text class="small" x="376" y="14">GPU compute pass</text>
    <rect class="out" x="550" y="0" width="18" height="18" rx="3"/>
    <text class="small" x="576" y="14">Readback / output</text>
    <rect class="warn" x="760" y="0" width="18" height="18" rx="3"/>
    <text class="small" x="786" y="14">同步边界 / debug snapshot</text>
  </g>

  <rect class="panel cpuLane" x="42" y="168" width="376" height="930" rx="22"/>
  <rect class="panel rdgLane" x="450" y="168" width="432" height="930" rx="22"/>
  <rect class="panel gpuLane" x="914" y="168" width="532" height="930" rx="22"/>
  <rect class="panel outLane" x="1478" y="168" width="280" height="930" rx="22"/>

  <text class="laneTitle" x="70" y="207">1. CPU 入口与输入准备</text>
  <text class="laneTitle" x="478" y="207">2. RDG 资源布局</text>
  <text class="laneTitle" x="942" y="207">3. GPU pass 顺序</text>
  <text class="laneTitle" x="1506" y="207">4. 读回与输出</text>

  <g class="shadow">
    <rect class="cpu" x="72" y="238" width="318" height="118" rx="12"/>
    <text class="nodeTitle" x="96" y="267">SpaceColonizationCSWithScales()</text>
    <text class="body" x="96" y="293">输入 SourceTransforms / TargetTransforms</text>
    <text class="body" x="96" y="317">Iterations, Activetime, RandGrow, Seed</text>
    <text class="code" x="96" y="340">InfluenceRadius -> GPU neighbor radius</text>
  </g>

  <g class="shadow">
    <rect class="cpu" x="72" y="398" width="318" height="170" rx="12"/>
    <text class="nodeTitle" x="96" y="427">BuildSpaceColonizationQueueCSImpl</text>
    <text class="body" x="96" y="453">SourcePositions：source 位置 + scale</text>
    <text class="body" x="96" y="477">InitialTargetPositions：source 前缀 + target</text>
    <text class="body" x="96" y="501">TargetCount = SourceCount + TargetCount</text>
    <text class="body" x="96" y="525">MaxNeighbors = clamp(128, 1, TargetCount)</text>
    <text class="small" x="96" y="549">过大请求会提前返回 false</text>
  </g>

  <g class="shadow">
    <rect class="warn" x="72" y="612" width="318" height="118" rx="12"/>
    <text class="nodeTitle" x="96" y="641">Render command 同步段</text>
    <text class="body" x="96" y="668">ENQUEUE_RENDER_COMMAND</text>
    <text class="body" x="96" y="692">GraphBuilder.Execute()</text>
    <text class="body" x="96" y="716">FlushRenderingCommands()</text>
  </g>

  <g class="shadow">
    <rect class="cpu" x="72" y="780" width="318" height="210" rx="12"/>
    <text class="nodeTitle" x="96" y="810">结果线构建前置数据</text>
    <text class="body" x="96" y="838">TargetPointScales</text>
    <text class="body" x="96" y="862">StartSourceScales / SourceLocations</text>
    <text class="body" x="96" y="886">最终传给 BuildSpaceColonizationLineResults</text>
    <rect class="pillBlue" x="96" y="914" width="258" height="44" rx="8"/>
    <text class="small" x="225" y="934" text-anchor="middle">可视化路径模式</text>
    <text class="code" x="225" y="951" text-anchor="middle">VisualizationTipToRoot / SourceToTipAnchored</text>
  </g>

  <g class="shadow">
    <rect class="rdg" x="480" y="238" width="372" height="152" rx="12"/>
    <text class="nodeTitle" x="506" y="268">上传 SRV</text>
    <text class="codeGreen" x="506" y="294">SourcePositions</text>
    <text class="codeGreen" x="506" y="318">InitialTargetPositions</text>
    <text class="body" x="506" y="344">InitialTargetPositions.w 保存 target scale</text>
    <text class="small" x="506" y="368">source 前缀让 GPU index 与最终节点 index 对齐</text>
  </g>

  <g class="shadow">
    <rect class="rdg" x="480" y="430" width="372" height="232" rx="12"/>
    <text class="nodeTitle" x="506" y="460">主状态 buffer</text>
    <text class="codeGreen" x="506" y="488">TargetPositions  UAV/SRV</text>
    <text class="codeGreen" x="506" y="512">State0 / State1 UAV/SRV</text>
    <text class="codeGreen" x="506" y="536">NeighborCounts / NeighborIndices</text>
    <text class="codeGreen" x="506" y="560">ProposalOwners / ProposalPositions</text>
    <text class="codeGreen" x="506" y="584">AxisA / AxisB</text>
    <text class="small" x="506" y="615">每个 pass 用 SRV 读上一步结果，用 UAV 写下一步结果。</text>
    <text class="small" x="506" y="638">NeighborIndices 容量：TargetCount * MaxNeighbors。</text>
  </g>

  <g class="shadow">
    <rect class="state" x="480" y="708" width="372" height="208" rx="12"/>
    <text class="nodeTitle" x="506" y="738">State Packing</text>
    <text class="code" x="506" y="766">State0 = int4(Attractor, End, Startpt, SpawnCount)</text>
    <text class="code" x="506" y="790">State1 = int4(Startid, PrePt, NextPt, BranchCount)</text>
    <text class="body" x="506" y="824">Attractor=1：还未被占用的吸引点</text>
    <text class="body" x="506" y="848">Attractor=0：已经成为生长节点</text>
    <text class="body" x="506" y="872">PrePt / NextPt：最终回溯成 PolyPath</text>
    <text class="small" x="506" y="896">C++: FSpaceColonizationGPUState4, 16 bytes</text>
  </g>

  <g class="shadow">
    <rect class="warn" x="480" y="956" width="372" height="92" rx="12"/>
    <text class="nodeTitle" x="506" y="986">Debug readbacks</text>
    <text class="body" x="506" y="1012">Initial / Neighbor / 每轮 Reset-Propose-Commit snapshot</text>
    <text class="small" x="506" y="1034">用于 SpaceColonizationStep 日志对齐 CPU/GPU 行为</text>
  </g>

  <g class="shadow">
    <rect class="gpu" x="944" y="238" width="472" height="94" rx="12"/>
    <text class="nodeTitle mono" x="1180" y="266" text-anchor="middle">InitializeSpaceColonizationQueueCS</text>
    <text class="body" x="970" y="294">TargetPositions = InitialTargetPositions</text>
    <text class="body" x="970" y="316">全部 target 初始化为 Attractor，PrePt / NextPt = -1</text>
  </g>

  <g class="shadow">
    <rect class="gpu" x="944" y="368" width="472" height="110" rx="12"/>
    <text class="nodeTitle mono" x="1180" y="396" text-anchor="middle">MarkSpaceColonizationSourcesCS</text>
    <text class="body" x="970" y="424">Source index 转为生长起点：Attractor=0, Startpt=1</text>
    <text class="body" x="970" y="448">TargetPositions[source] = SourcePositions[source]</text>
    <text class="small" x="970" y="468">Startid = source index，后续 scale 从 source 链路传递</text>
  </g>

  <g class="shadow">
    <rect class="gpu" x="944" y="516" width="472" height="132" rx="12"/>
    <text class="nodeTitle mono" x="1180" y="544" text-anchor="middle">BuildSpaceColonizationNeighborsCS</text>
    <text class="body" x="970" y="572">每个节点扫描 TargetPositions，筛 InfluenceRadius 内邻居</text>
    <text class="body" x="970" y="596">按距离插入排序，最多保存 MaxNeighbors</text>
    <text class="body" x="970" y="620">邻居表只构建一次，迭代中不重建</text>
  </g>

  <g class="shadow">
    <rect class="loop" x="944" y="690" width="472" height="270" rx="14"/>
    <text class="nodeTitle" x="970" y="721">Per Iteration Loop</text>
    <text class="small" x="1290" y="721">重复 Iterations 次</text>

    <rect class="pillOrange" x="970" y="746" width="418" height="48" rx="8"/>
    <text class="codeOrange" x="990" y="773">ResetSpaceColonizationProposalsCS</text>
    <text class="small" x="1214" y="773">owner=0xffffffff, position.w=-1</text>

    <rect class="pillOrange" x="970" y="812" width="418" height="72" rx="8"/>
    <text class="codeOrange" x="990" y="838">ProposeSpaceColonizationGrowthCS</text>
    <text class="small" x="990" y="860">活跃节点读取固定邻居表，找仍为 Attractor 的候选</text>
    <text class="small" x="990" y="876">NewPosition = RuntimeCurrent + normalize(DirSum) * nearestDist</text>

    <rect class="pillOrange" x="970" y="902" width="418" height="42" rx="8"/>
    <text class="codeOrange" x="990" y="928">CommitSpaceColonizationGrowthCS</text>
    <text class="small" x="1216" y="928">InterlockedMin 后的 owner 赢得吸引点</text>
  </g>

  <g class="shadow">
    <rect class="gpu" x="944" y="1000" width="472" height="80" rx="12"/>
    <text class="nodeTitle mono" x="1180" y="1028" text-anchor="middle">BuildAxesCS + SmoothAxesCS x3</text>
    <text class="body" x="970" y="1056">先由 PrePt / NextPt 计算 raw axis，再用 AxisA/B ping-pong 平滑。</text>
  </g>

  <g class="shadow">
    <rect class="out" x="1508" y="238" width="220" height="152" rx="12"/>
    <text class="nodeTitle" x="1532" y="268">GPU Copy</text>
    <text class="body" x="1532" y="296">TargetReadback</text>
    <text class="body" x="1532" y="320">State0Readback</text>
    <text class="body" x="1532" y="344">State1Readback</text>
    <text class="body" x="1532" y="368">AxisReadback</text>
  </g>

  <g class="shadow">
    <rect class="warn" x="1508" y="434" width="220" height="160" rx="12"/>
    <text class="nodeTitle" x="1532" y="464">ReadbackAndFlush</text>
    <text class="body" x="1532" y="492">FlushRenderingCommands()</text>
    <text class="body" x="1532" y="516">必要时等待 GPU idle</text>
    <text class="body" x="1532" y="540">Lock / Memcpy / Unlock</text>
    <text class="small" x="1532" y="570">未 ready 则返回 false</text>
  </g>

  <g class="shadow">
    <rect class="out" x="1508" y="640" width="220" height="142" rx="12"/>
    <text class="nodeTitle" x="1532" y="670">Decode</text>
    <text class="body" x="1532" y="698">TargetPositions -> FVector</text>
    <text class="body" x="1532" y="722">State0/1 -> SCAttributes</text>
    <text class="body" x="1532" y="746">Axis -> Attribute.N</text>
    <text class="small" x="1532" y="764">ConvertSpaceColonizationGPUStateToAttributes</text>
  </g>

  <g class="shadow">
    <rect class="out" x="1508" y="826" width="220" height="164" rx="12"/>
    <text class="nodeTitle" x="1532" y="856">Build Lines</text>
    <text class="body" x="1532" y="884">BuildSpaceColonizationLineResults</text>
    <text class="body" x="1532" y="908">从 End 节点沿 PrePt 回溯</text>
    <text class="body" x="1532" y="932">附带 point scale 与平滑 axis</text>
    <text class="small" x="1532" y="960">输出 PolyPath / LineResult</text>
  </g>

  <path class="arrowBlue" d="M 231 356 L 231 398"/>
  <path class="arrowBlue" d="M 390 483 C 430 483 440 314 480 314"/>
  <path class="arrowBlue" d="M 231 568 L 231 612"/>
  <path class="arrowGreen" d="M 852 314 C 900 314 898 285 944 285"/>
  <path class="arrowOrange" d="M 1180 332 L 1180 368"/>
  <path class="arrowOrange" d="M 1180 478 L 1180 516"/>
  <path class="arrowOrange" d="M 1180 648 L 1180 690"/>
  <path class="arrowOrange dash" d="M 1416 825 C 1452 825 1452 690 1416 690"/>
  <path class="arrowOrange" d="M 1180 960 L 1180 1000"/>
  <path class="arrowPurple" d="M 1416 1040 C 1460 1040 1462 314 1508 314"/>
  <path class="arrowPurple" d="M 1618 390 L 1618 434"/>
  <path class="arrowPurple" d="M 1618 594 L 1618 640"/>
  <path class="arrowPurple" d="M 1618 782 L 1618 826"/>
  <path class="arrowGreen dash" d="M 852 812 C 894 812 902 824 944 824"/>
  <path class="arrow" d="M 1508 908 C 1420 908 1420 1026 1416 1026"/>

  <rect class="panel" x="42" y="1130" width="1716" height="222" rx="20"/>
  <text class="laneTitle" x="72" y="1168">关键语义</text>

  <g>
    <rect class="soft" x="72" y="1194" width="390" height="116" rx="12"/>
    <text class="nodeTitle" x="96" y="1222">目标空间</text>
    <text class="code" x="96" y="1248">InitialTargetPositions</text>
    <text class="body" x="262" y="1248">初始化输入与 scale 来源</text>
    <text class="codeGreen" x="96" y="1274">TargetPositions</text>
    <text class="body" x="262" y="1274">运行时节点位置，Commit 后变化</text>
    <text class="small" x="96" y="1298">BuildNeighbors 后邻居索引固定，但 Propose 读取运行时位置。</text>
  </g>

  <g>
    <rect class="soft" x="500" y="1194" width="390" height="116" rx="12"/>
    <text class="nodeTitle" x="524" y="1222">竞争模型</text>
    <text class="body" x="524" y="1248">Propose：每个活跃节点写自己的 proposal。</text>
    <text class="body" x="524" y="1274">Commit：吸引点通过 ProposalOwners 选 owner。</text>
    <text class="codeOrange" x="524" y="1298">InterlockedMin(owner, sourceIndex)</text>
  </g>

  <g>
    <rect class="soft" x="928" y="1194" width="390" height="116" rx="12"/>
    <text class="nodeTitle" x="952" y="1222">轴向输出</text>
    <text class="body" x="952" y="1248">BuildAxes 由前后节点生成方向。</text>
    <text class="body" x="952" y="1274">SmoothAxes 使用 PrePt / NextPt 局部平滑。</text>
    <text class="small" x="952" y="1298">Axis readback 最终写入 FSpaceColonizationAttribute.N。</text>
  </g>

  <g>
    <rect class="soft" x="1356" y="1194" width="372" height="116" rx="12"/>
    <text class="nodeTitle" x="1380" y="1222">源码锚点</text>
    <text class="codePurple" x="1380" y="1248">GenerateVines.cpp</text>
    <text class="small" x="1380" y="1272">BuildSpaceColonizationQueueCSImpl</text>
    <text class="codePurple" x="1380" y="1298">SpaceColonizationQueue.usf</text>
  </g>
</svg>
