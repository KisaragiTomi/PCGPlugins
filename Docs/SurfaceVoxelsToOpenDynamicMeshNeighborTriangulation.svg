<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280" role="img" aria-labelledby="title desc">
  <title id="title">SurfaceVoxelsToOpenDynamicMesh neighbor filtering and triangulation flow</title>
  <desc id="desc">Current flow for filtering 18-neighbor surface voxel patches, choosing topology links, forming 2x2 ring candidates, and emitting topology triangles or fallback quads.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#26313f"/>
    </marker>
    <marker id="softArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6b7a"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #17202b; }
      .subtitle { font: 400 16px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #536273; }
      .sectionTitle { font: 700 20px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #1c2a38; }
      .nodeTitle { font: 700 17px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #17202b; }
      .nodeText { font: 400 14px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #536273; }
      .code { font: 600 13px "Cascadia Mono", Consolas, monospace; fill: #26313f; }
      .box { fill: #ffffff; stroke: #c7d1dc; stroke-width: 1.4; rx: 8; }
      .decision { fill: #fff9eb; stroke: #d8a53b; stroke-width: 1.5; rx: 8; }
      .emit { fill: #eef8f4; stroke: #54a17d; stroke-width: 1.5; rx: 8; }
      .reject { fill: #fff1f1; stroke: #d97a7a; stroke-width: 1.5; rx: 8; }
      .state { fill: #edf3fb; stroke: #7fa1c9; stroke-width: 1.3; rx: 8; }
      .group { fill: #ffffff; stroke: #d5dde7; stroke-width: 1.2; rx: 10; }
      .line { fill: none; stroke: #26313f; stroke-width: 2; marker-end: url(#arrow); }
      .softLine { fill: none; stroke: #5d6b7a; stroke-width: 1.6; marker-end: url(#softArrow); }
      .dashLine { fill: none; stroke: #5d6b7a; stroke-width: 1.6; stroke-dasharray: 6 6; marker-end: url(#softArrow); }
      .chip { fill: #eef2f7; stroke: #ccd5df; stroke-width: 1; rx: 13; }
      .chipText { font: 600 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #384657; }
      .voxel { fill: #ffffff; stroke: #52657a; stroke-width: 2; rx: 5; }
      .voxelCenter { fill: #1f7a8c; stroke: #ffffff; stroke-width: 2; }
      .neighborFace { fill: #dff3ed; stroke: #43946f; stroke-width: 2; rx: 5; }
      .neighborEdge { fill: #f2e8ff; stroke: #8e65bd; stroke-width: 2; rx: 5; }
      .diagonal { fill: #fff1cf; stroke: #c58a24; stroke-width: 2; rx: 5; }
      .bad { fill: #ffe4e4; stroke: #d26b6b; stroke-width: 2; rx: 5; }
      .tri { fill: rgba(49, 134, 160, 0.18); stroke: #3186a0; stroke-width: 2; }
      .triAlt { fill: rgba(214, 150, 61, 0.18); stroke: #d6963d; stroke-width: 2; }
      .legendText { font: 400 13px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1280"/>
  <text class="title" x="64" y="58">SurfaceVoxelsToOpenDynamicMesh：邻居筛选与三角面化流程</text>
  <text class="subtitle" x="64" y="88">对应当前实现：GPU surface voxels -> Patch 拓扑节点 -> 18 邻域候选边 -> 2x2 ring / extended tri -> topology triangles -> fallback quad</text>

  <rect class="group" x="48" y="120" width="1504" height="585"/>
  <text class="sectionTitle" x="76" y="154">A. 邻居链接候选：先判断“能不能连边”</text>

  <rect class="box" x="76" y="188" width="250" height="118"/>
  <text class="nodeTitle" x="96" y="216">1. 生成 Patch</text>
  <text class="nodeText" x="96" y="244">每个有效 surface voxel</text>
  <text class="nodeText" x="96" y="266">只保留一个 Cell</text>
  <text class="code" x="96" y="290">Cell / Center / Normal / AxisX / AxisY</text>

  <rect class="decision" x="374" y="188" width="274" height="118"/>
  <text class="nodeTitle" x="394" y="216">2. 扫描 18 邻域</text>
  <text class="nodeText" x="394" y="244">6 个 face + 12 个 edge</text>
  <text class="nodeText" x="394" y="266">只看 CellToPatchIndex 中存在者</text>
  <text class="code" x="394" y="290">NeighborPatchIndex &gt; PatchIndex</text>

  <rect class="decision" x="696" y="188" width="268" height="118"/>
  <text class="nodeTitle" x="716" y="216">3. 距离 / 方向过滤</text>
  <text class="nodeText" x="716" y="244">中心距离不能超过</text>
  <text class="code" x="716" y="266">(SafeVoxelSize * 2.5)^2</text>
  <text class="nodeText" x="716" y="290">Delta 归一化后不能为零</text>

  <rect class="decision" x="1012" y="188" width="240" height="118"/>
  <text class="nodeTitle" x="1032" y="216">4. 阈值按类型切换</text>
  <text class="nodeText" x="1032" y="244">Manhattan == 1：face</text>
  <text class="nodeText" x="1032" y="266">否则：edge neighbor</text>
  <text class="nodeText" x="1032" y="290">edge 用 extended 阈值</text>

  <rect class="decision" x="1300" y="188" width="220" height="118"/>
  <text class="nodeTitle" x="1320" y="216">5. 法线过滤</text>
  <text class="code" x="1320" y="246">Dot(Na, Nb)</text>
  <text class="nodeText" x="1320" y="272">小于 NormalThreshold</text>
  <text class="nodeText" x="1320" y="294">直接 continue</text>

  <path class="line" d="M 326 247 H 374"/>
  <path class="line" d="M 648 247 H 696"/>
  <path class="line" d="M 964 247 H 1012"/>
  <path class="line" d="M 1252 247 H 1300"/>

  <rect class="decision" x="76" y="360" width="250" height="125"/>
  <text class="nodeTitle" x="96" y="389">6. 切向过滤</text>
  <text class="code" x="96" y="417">1 - abs(dot(Direction, Normal))</text>
  <text class="nodeText" x="96" y="445">A/B 任一低于 TangentThreshold</text>
  <text class="nodeText" x="96" y="467">则拒绝</text>

  <rect class="decision" x="374" y="360" width="274" height="125"/>
  <text class="nodeTitle" x="394" y="389">7. 匹配双方 patch 边</text>
  <text class="nodeText" x="394" y="417">A：用 Direction 找最佳边</text>
  <text class="nodeText" x="394" y="443">B：用 -Direction 找最佳边</text>
  <text class="code" x="394" y="469">AxisX / -AxisX / AxisY / -AxisY</text>

  <rect class="decision" x="696" y="360" width="268" height="125"/>
  <text class="nodeTitle" x="716" y="389">8. 边方向阈值</text>
  <text class="nodeText" x="716" y="417">BestDotA / BestDotB</text>
  <text class="nodeText" x="716" y="443">必须都 >= EdgeLinkThreshold</text>
  <text class="nodeText" x="716" y="469">否则该邻居无效</text>

  <rect class="box" x="1012" y="360" width="240" height="125"/>
  <text class="nodeTitle" x="1032" y="389">9. 生成候选边</text>
  <text class="code" x="1032" y="417">Candidate(A, B, EdgeA, EdgeB)</text>
  <text class="nodeText" x="1032" y="445">Score = 法线平滑 * 8</text>
  <text class="nodeText" x="1032" y="469">+ 切向 * 2 + 距离；edge * 0.85</text>

  <rect class="emit" x="1300" y="360" width="220" height="125"/>
  <text class="nodeTitle" x="1320" y="389">10. 排序后选边</text>
  <text class="nodeText" x="1320" y="417">高分优先</text>
  <text class="nodeText" x="1320" y="443">每 patch 最多 MaxLinks</text>
  <text class="nodeText" x="1320" y="469">每条 patch 边只能被选一次</text>

  <path class="line" d="M 1410 306 V 332 H 201 V 360"/>
  <path class="line" d="M 326 422 H 374"/>
  <path class="line" d="M 648 422 H 696"/>
  <path class="line" d="M 964 422 H 1012"/>
  <path class="line" d="M 1252 422 H 1300"/>

  <rect class="state" x="224" y="548" width="310" height="95"/>
  <text class="nodeTitle" x="246" y="578">边状态落地</text>
  <text class="nodeText" x="246" y="606">Chosen：被最终选中</text>
  <text class="nodeText" x="246" y="630">Rejected：有候选但被竞争淘汰；否则 Boundary</text>

  <rect class="state" x="646" y="548" width="310" height="95"/>
  <text class="nodeTitle" x="668" y="578">连通分量</text>
  <text class="nodeText" x="668" y="606">只用 ChosenLinkCandidates 做 union</text>
  <text class="nodeText" x="668" y="630">给每个 Patch 写 ComponentId</text>

  <rect class="state" x="1068" y="548" width="310" height="95"/>
  <text class="nodeTitle" x="1090" y="578">链接用于角点焊接</text>
  <text class="nodeText" x="1090" y="606">后续 fallback quad 的角点</text>
  <text class="nodeText" x="1090" y="630">按 Chosen 边 direct/cross 距离 union</text>

  <path class="softLine" d="M 1410 485 V 520 H 379 V 548"/>
  <path class="softLine" d="M 534 596 H 646"/>
  <path class="softLine" d="M 956 596 H 1068"/>

  <rect class="group" x="48" y="900" width="1504" height="320"/>
  <text class="sectionTitle" x="76" y="934">B. 三角面化：再判断“能不能成面”</text>

  <rect class="box" x="76" y="969" width="270" height="160"/>
  <text class="nodeTitle" x="96" y="998">11. 2x2 ring 候选</text>
  <text class="nodeText" x="96" y="1026">对每个 Patch 取 OffsetA / OffsetB</text>
  <text class="nodeText" x="96" y="1052">要求两个 offset 正交</text>
  <text class="nodeText" x="96" y="1078">查 A、B、Diagonal 三格</text>
  <text class="code" x="96" y="1105">Patch, PatchA, PatchB, PatchDiagonal</text>

  <rect class="decision" x="396" y="969" width="260" height="160"/>
  <text class="nodeTitle" x="416" y="998">12. ring 过滤</text>
  <text class="nodeText" x="416" y="1026">4 点完整：检查网格平面对齐</text>
  <text class="nodeText" x="416" y="1052">和所有点间最小法线 dot</text>
  <text class="nodeText" x="416" y="1078">缺 1 点：3-voxel fallback</text>
  <text class="nodeText" x="416" y="1104">只检查 extended normal</text>

  <rect class="box" x="706" y="969" width="250" height="160"/>
  <text class="nodeTitle" x="726" y="998">13. 选择拆分对角线</text>
  <text class="nodeText" x="726" y="1026">比较两条对角线法线平滑度</text>
  <text class="nodeText" x="726" y="1052">更平滑的一组优先</text>
  <text class="code" x="726" y="1081">Triangle0 / Triangle1</text>
  <text class="nodeText" x="726" y="1105">按 Score 降序发射</text>

  <rect class="emit" x="1006" y="969" width="250" height="160"/>
  <text class="nodeTitle" x="1026" y="998">14. AppendTopologyTriangle</text>
  <text class="nodeText" x="1026" y="1026">去重：三点 key 唯一</text>
  <text class="nodeText" x="1026" y="1052">限制：任一 topology edge</text>
  <text class="nodeText" x="1026" y="1078">最多被 2 个三角形使用</text>
  <text class="nodeText" x="1026" y="1104">退化检查 + winding 按平均法线修正</text>

  <rect class="emit" x="1306" y="969" width="214" height="160"/>
  <text class="nodeTitle" x="1326" y="998">15. 补救与回退</text>
  <text class="nodeText" x="1326" y="1026">仍未使用的 patch</text>
  <text class="nodeText" x="1326" y="1052">再用 18 邻域两两组 tri</text>
  <text class="nodeText" x="1326" y="1078">最终未参与 topology tri</text>
  <text class="nodeText" x="1326" y="1104">输出自己的 patch quad</text>

  <path class="line" d="M 346 1049 H 396"/>
  <path class="line" d="M 656 1049 H 706"/>
  <path class="line" d="M 956 1049 H 1006"/>
  <path class="line" d="M 1256 1049 H 1306"/>

  <g transform="translate(84 1160)">
    <rect class="chip" x="0" y="0" width="164" height="34"/>
    <text class="chipText" x="18" y="22">候选边：先评分排序</text>
    <rect class="chip" x="182" y="0" width="188" height="34"/>
    <text class="chipText" x="200" y="22">Chosen 边：用于 Component / weld</text>
    <rect class="chip" x="388" y="0" width="188" height="34"/>
    <text class="chipText" x="406" y="22">Topology tri：用中心点成面</text>
    <rect class="chip" x="594" y="0" width="214" height="34"/>
    <text class="chipText" x="612" y="22">Fallback quad：只给未参与点兜底</text>
  </g>

  <rect class="group" x="48" y="106" width="1504" height="1" opacity="0"/>

  <g transform="translate(1060 682)">
    <text class="sectionTitle" x="0" y="0">邻域与 ring 小图</text>
    <g transform="translate(0 24)">
      <rect class="voxel" x="80" y="80" width="54" height="54"/>
      <circle class="voxelCenter" cx="107" cy="107" r="8"/>
      <text class="small" x="91" y="151">Patch</text>

      <rect class="neighborFace" x="142" y="80" width="54" height="54"/>
      <text class="small" x="151" y="151">face</text>
      <rect class="neighborFace" x="80" y="18" width="54" height="54"/>
      <text class="small" x="91" y="12">face</text>
      <rect class="neighborEdge" x="142" y="18" width="54" height="54"/>
      <text class="small" x="141" y="12">edge</text>
      <rect class="bad" x="18" y="18" width="54" height="54"/>
      <text class="small" x="12" y="12">无 Patch</text>

      <path class="softLine" d="M 107 107 L 169 107"/>
      <path class="softLine" d="M 107 107 L 107 45"/>
      <path class="dashLine" d="M 107 107 L 169 45"/>
      <text class="legendText" x="226" y="44">18 邻域先形成</text>
      <text class="legendText" x="226" y="66">LinkCandidate</text>
      <text class="legendText" x="226" y="94">face 更严格</text>
      <text class="legendText" x="226" y="116">edge 使用 extended 阈值</text>
    </g>
  </g>

  <g transform="translate(88 682)">
    <text class="sectionTitle" x="0" y="0">2x2 ring 拆三角</text>
    <g transform="translate(0 24)">
      <rect class="voxel" x="0" y="70" width="66" height="66"/>
      <rect class="neighborFace" x="76" y="70" width="66" height="66"/>
      <rect class="neighborFace" x="0" y="0" width="66" height="66"/>
      <rect class="diagonal" x="76" y="0" width="66" height="66"/>
      <circle class="voxelCenter" cx="33" cy="103" r="7"/>
      <circle class="voxelCenter" cx="109" cy="103" r="7"/>
      <circle class="voxelCenter" cx="33" cy="33" r="7"/>
      <circle class="voxelCenter" cx="109" cy="33" r="7"/>
      <polygon class="tri" points="33,103 109,103 109,33"/>
      <polygon class="triAlt" points="33,103 109,33 33,33"/>
      <text class="small" x="160" y="28">完整 4 点 ring：</text>
      <text class="small" x="160" y="52">按 plane alignment、</text>
      <text class="small" x="160" y="76">normal smoothness、</text>
      <text class="small" x="160" y="100">diagonal smoothness 评分</text>
      <text class="small" x="160" y="126">再发 Triangle0 / Triangle1</text>
    </g>
  </g>

  <g transform="translate(512 682)">
    <text class="sectionTitle" x="0" y="0">3-voxel fallback</text>
    <g transform="translate(0 24)">
      <rect class="voxel" x="0" y="70" width="66" height="66"/>
      <rect class="neighborFace" x="76" y="70" width="66" height="66"/>
      <rect class="neighborFace" x="0" y="0" width="66" height="66"/>
      <rect class="bad" x="76" y="0" width="66" height="66"/>
      <circle class="voxelCenter" cx="33" cy="103" r="7"/>
      <circle class="voxelCenter" cx="109" cy="103" r="7"/>
      <circle class="voxelCenter" cx="33" cy="33" r="7"/>
      <polygon class="tri" points="33,103 109,103 33,33"/>
      <text class="small" x="160" y="42">四角只存在 3 个时：</text>
      <text class="small" x="160" y="66">若三点法线都满足</text>
      <text class="small" x="160" y="90">extended normal 阈值</text>
      <text class="small" x="160" y="114">直接输出单个三角候选</text>
    </g>
  </g>
</svg>
