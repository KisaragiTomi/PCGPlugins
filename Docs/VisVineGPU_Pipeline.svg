<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1540" role="img" aria-labelledby="title desc">
  <title id="title">VisVine GPU Voxel Pipeline</title>
  <desc id="desc">Current AVineContainer VisVine GPU path: CPU line preparation, voxel buffer upload, RDG compute passes, GPU readback, and DynamicMesh append.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#15803d"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset=".55" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #1e293b; }
      .mono { font-family: Consolas, "Cascadia Mono", monospace; }
      .h1 { font-size: 27px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .phaseTitle { font-size: 15px; font-weight: 700; }
      .nodeTitle { font-size: 13px; font-weight: 700; }
      .body { font-size: 11px; fill: #334155; }
      .tiny { font-size: 10px; fill: #64748b; }
      .label { font-size: 10px; font-weight: 700; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .cpu { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.4; }
      .gpu { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.4; }
      .io { fill: #fef3c7; stroke: #d97706; stroke-width: 1.4; }
      .mesh { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.4; }
      .data { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.1; }
      .warn { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.1; }
      .arrow { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #334155; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .arrowGpu { stroke: #15803d; stroke-width: 1.5; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="1280" height="1540" fill="#f8fafc"/>

  <rect x="32" y="24" width="1216" height="96" rx="10" fill="url(#headerGrad)" stroke="#cbd5e1"/>
  <text class="h1" x="640" y="62" text-anchor="middle">VisVine GPU Voxel 流程</text>
  <text class="subtitle mono" x="640" y="88" text-anchor="middle">AVineContainer::VisVine(MainVine, bUseGPU=true) -> VisVineGPUInternal()</text>
  <text class="tiny" x="640" y="108" text-anchor="middle">当前实现基于 CachedSurfaceVoxels 与 VVVoxel.usf，不再走旧的 triangle soup 最近点查询图</text>

  <g transform="translate(52 138)">
    <rect class="cpu" x="0" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="26" y="14">CPU / Game Thread</text>
    <rect class="gpu" x="182" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="208" y="14">GPU Compute / RDG</text>
    <rect class="io" x="382" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="408" y="14">GPU Readback</text>
    <rect class="mesh" x="558" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="584" y="14">DynamicMesh 输出</text>
    <rect class="warn" x="754" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="780" y="14">early return false</text>
  </g>

  <!-- Phase 0 -->
  <rect class="band" x="48" y="182" width="1184" height="118" rx="9"/>
  <text class="phaseTitle" x="70" y="212" fill="#1d4ed8">0. 入口与校验</text>
  <rect class="cpu" x="76" y="232" width="260" height="46" rx="6"/>
  <text class="nodeTitle mono" x="206" y="252" text-anchor="middle">VisVine(MainVine, true)</text>
  <text class="tiny" x="206" y="268" text-anchor="middle">选择 GPU 分支</text>
  <path class="arrowThin" d="M336 255 H390"/>
  <rect class="cpu" x="392" y="224" width="316" height="62" rx="6"/>
  <text class="nodeTitle mono" x="550" y="244" text-anchor="middle">VisVineGPUInternal()</text>
  <text class="body" x="412" y="262">Lines = MainVine ? TubeLines : PlaneLines</text>
  <text class="tiny" x="412" y="277">LineSourceScales / Locations / PointScales 随分支选择</text>
  <path class="arrowThin" d="M708 255 H762"/>
  <rect class="warn" x="764" y="215" width="420" height="80" rx="6"/>
  <text class="nodeTitle" x="784" y="238">必要条件</text>
  <text class="body" x="784" y="256">Lines 非空，ResampleLength 有效，DynamicMeshComponent 有效</text>
  <text class="body" x="784" y="273">CurveControl 自动创建；CachedSurfaceVoxels.Cells 必须非空</text>

  <path class="arrow" d="M640 300 V338"/>

  <!-- Phase 1 -->
  <rect class="band" x="48" y="338" width="1184" height="310" rx="9"/>
  <text class="phaseTitle" x="70" y="368" fill="#1d4ed8">1. CPU 线预处理与 GPU 输入打包</text>

  <rect class="data" x="76" y="392" width="248" height="130" rx="6"/>
  <text class="nodeTitle" x="96" y="416">输入数据</text>
  <text class="body" x="96" y="438">TubeLines / PlaneLines</text>
  <text class="body" x="96" y="456">CachedSurfaceVoxels</text>
  <text class="body" x="96" y="474">VV.CurveControl 与噪声参数</text>
  <text class="body" x="96" y="492">LinePointScales</text>
  <text class="tiny" x="96" y="510">GPU/CPU 分支共享同一套预处理逻辑</text>

  <path class="arrowThin" d="M324 457 H366"/>

  <rect class="cpu" x="368" y="386" width="430" height="192" rx="7"/>
  <text class="nodeTitle mono" x="583" y="412" text-anchor="middle">PrepareVVLinesCPU_Voxel()</text>
  <rect x="394" y="431" width="176" height="30" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="label" x="482" y="451" text-anchor="middle">SC point jitter</text>
  <rect x="594" y="431" width="176" height="30" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="label" x="682" y="451" text-anchor="middle">Smooth / Resample</text>
  <path class="arrowThin" d="M570 446 H592"/>
  <rect x="394" y="475" width="176" height="38" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="label" x="482" y="493" text-anchor="middle">10x voxel snap</text>
  <text class="tiny" x="482" y="507" text-anchor="middle">Curl + Perlin</text>
  <rect x="594" y="475" width="176" height="38" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="label" x="682" y="493" text-anchor="middle">plane merge</text>
  <text class="tiny" x="682" y="507" text-anchor="middle">sample 80%, reduce /15</text>
  <path class="arrowThin" d="M570 494 H592"/>
  <rect x="444" y="529" width="276" height="34" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="label" x="582" y="550" text-anchor="middle">最终投影到 voxel surface + VinesOffset</text>

  <path class="arrowThin" d="M798 482 H842"/>

  <rect class="cpu" x="844" y="386" width="326" height="192" rx="7"/>
  <text class="nodeTitle mono" x="1007" y="412" text-anchor="middle">BuildVVGPUInput()</text>
  <text class="body" x="866" y="438">PathPoints: xyz=位置，w=厚度倍率</text>
  <text class="body" x="866" y="456">PathPointAxes: 预留/平滑轴</text>
  <text class="body" x="866" y="474">PathPointMeta: prev / next / base / count</text>
  <text class="body" x="866" y="492">PathPointCurveU: 累积长度</text>
  <text class="body" x="866" y="510">SegmentMeta: 每段 start / end</text>
  <text class="tiny" x="866" y="534">PathPoints.w = CurveControl.G * SC point scale</text>

  <path class="arrow" d="M1008 578 V682"/>

  <!-- Phase 2 -->
  <rect class="band" x="48" y="682" width="1184" height="408" rx="9"/>
  <text class="phaseTitle" x="70" y="712" fill="#15803d">2. Render Thread / RDG：Voxel GPU Dispatch</text>

  <rect class="cpu" x="76" y="736" width="302" height="158" rx="7"/>
  <text class="nodeTitle" x="96" y="761">Voxel 上传准备</text>
  <text class="body" x="96" y="784">Cells -> GPUVoxelCells</text>
  <text class="body" x="96" y="802">TargetPositions / Normals 做 finite 校验</text>
  <text class="body" x="96" y="820">BuildVineVoxelHashSlots()</text>
  <text class="tiny" x="96" y="842">失败时保留 1 slot，shader 线性查找 fallback</text>
  <text class="tiny" x="96" y="864">输出大小超 MAX_uint32 时提前失败</text>

  <path class="arrowThin" d="M378 815 H428"/>

  <rect class="gpu" x="430" y="724" width="344" height="186" rx="7"/>
  <text class="nodeTitle" x="452" y="750">RDG buffer 创建</text>
  <text class="body" x="452" y="773">上传 SRV: PathPoints / Meta / CurveU / SegmentMeta</text>
  <text class="body" x="452" y="791">上传 SRV: VoxelCells / HashSlots / Normals / Targets</text>
  <text class="body" x="452" y="809">输出 UAV: OutVertices / OutUVs / OutIndices</text>
  <text class="body" x="452" y="827">中间 UAV: PathPointTangents / Normals / SurfaceTarget ping-pong</text>
  <text class="tiny mono" x="452" y="852">ENQUEUE_RENDER_COMMAND(VVVoxelGPU)</text>
  <text class="tiny" x="452" y="875">GraphBuilder.Execute() 后标记 bRenderWorkQueued</text>

  <path class="arrowGpu" d="M774 817 H826"/>

  <rect class="gpu" x="828" y="724" width="356" height="88" rx="7"/>
  <text class="nodeTitle mono" x="1006" y="748" text-anchor="middle">Pass A: BuildVVVoxelAxesCS</text>
  <text class="body" x="850" y="770">每个 PathPoint 计算 tangent / normal</text>
  <text class="body" x="850" y="788">SampleVoxelNeighbors() 采样 voxel surface normal</text>

  <path class="arrowGpu" d="M1006 812 V830"/>

  <rect class="gpu" x="828" y="832" width="356" height="72" rx="7"/>
  <text class="nodeTitle mono" x="1006" y="855" text-anchor="middle">Pass B: SmoothProjectionCS x N</text>
  <text class="body" x="850" y="877">投射后平滑 SurfaceTarget / SurfaceNormal</text>
  <text class="tiny" x="850" y="893">N 为蓝图参数，默认 3；ping-pong 输出最终投射结果</text>

  <path class="arrowGpu" d="M1006 904 V922"/>

  <rect class="gpu" x="828" y="924" width="356" height="82" rx="7"/>
  <text class="nodeTitle mono" x="1006" y="946" text-anchor="middle">Pass C: BuildVVVoxelCS</text>
  <text class="body" x="850" y="966">Center = smoothed Target + Normal * VinesOffset</text>
  <text class="body" x="850" y="984">使用 smoothed SurfaceNormal 做截面变形</text>
  <text class="tiny mono" x="850" y="998">DispatchCount = max(OutputVertexCount, SegmentCount)</text>

  <path class="arrowGpu" d="M1006 1006 V1020"/>

  <rect class="io" x="368" y="1018" width="816" height="48" rx="7"/>
  <text class="nodeTitle" x="390" y="1040">AddEnqueueCopyPass()</text>
  <text class="body" x="560" y="1040">OutVertices / OutUVs / OutIndices / smoothed targets -> FRHIGPUBufferReadback</text>
  <path class="arrowThin" d="M776 1066 V1126"/>

  <!-- Phase 3 -->
  <rect class="band" x="48" y="1126" width="1184" height="292" rx="9"/>
  <text class="phaseTitle" x="70" y="1156" fill="#92400e">3. CPU readback 与 DynamicMesh 输出</text>

  <rect class="io" x="76" y="1182" width="306" height="94" rx="7"/>
  <text class="nodeTitle" x="98" y="1207">GPU -> CPU Readback</text>
  <text class="body" x="98" y="1228">FlushRenderingCommands()</text>
  <text class="body" x="98" y="1246">必要时 SubmitAndBlockUntilGPUIdle()</text>
  <text class="body" x="98" y="1264">Lock / Memcpy / Unlock 三个 buffer</text>

  <path class="arrowThin" d="M382 1230 H432"/>

  <rect class="cpu" x="434" y="1182" width="280" height="94" rx="7"/>
  <text class="nodeTitle" x="456" y="1207">UV 与网格构建</text>
  <text class="body mono" x="456" y="1228">RecomputeVineOutputUVs...</text>
  <text class="body mono" x="456" y="1246">BuildDynamicMeshFromGPU...</text>
  <text class="tiny" x="456" y="1264">过滤退化三角形，重算法线</text>

  <path class="arrowThin" d="M714 1230 H764"/>

  <rect class="mesh" x="766" y="1182" width="406" height="94" rx="7"/>
  <text class="nodeTitle" x="788" y="1207">Append 到 ContainerMesh</text>
  <text class="body" x="788" y="1228">AppendMesh(ContainerMesh, VineMesh)</text>
  <text class="body" x="788" y="1246">MaterialID: tube=0, plane=1</text>
  <text class="body" x="788" y="1264">NotifyMeshUpdated / UpdateBounds / dirty render state</text>

  <path class="arrow" d="M640 1276 V1318"/>
  <rect x="312" y="1318" width="656" height="58" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text class="nodeTitle" x="640" y="1342" text-anchor="middle" fill="#166534">return true</text>
  <text class="body" x="640" y="1360" text-anchor="middle">DynamicMeshComponent 中已经追加当前 MainVine 对应的藤蔓网格</text>

  <!-- Data bridge labels -->
  <rect class="data" x="76" y="1438" width="1096" height="56" rx="7"/>
  <text class="nodeTitle" x="100" y="1462">源码锚点</text>
  <text class="body mono" x="100" y="1481">GeometryEditorActor.cpp: VisVineGPUInternal(), PrepareVVLinesCPU_Voxel(), BuildVVGPUInput(), DispatchVVGPU_Voxel()</text>
  <text class="body mono" x="100" y="1499">Shaders/Private/VVVoxel.usf: BuildVVVoxelAxesCS(), BuildVVVoxelCS()</text>

  <!-- Vertical phase separators -->
  <path class="arrowThin dash" d="M640 648 V682"/>
  <path class="arrowThin dash" d="M640 1090 V1126"/>
</svg>
