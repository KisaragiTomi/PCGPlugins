<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260">
  <defs>
    <linearGradient id="page-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#EDF4F7"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B7791F"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17803D"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <style>
      text {
        font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }
      .title {
        fill: #0F172A;
        font-size: 34px;
        font-weight: 760;
      }
      .subtitle {
        fill: #475569;
        font-size: 18px;
        font-weight: 440;
      }
      .badge {
        fill: #334155;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .lane-title {
        fill: #172033;
        font-size: 23px;
        font-weight: 760;
      }
      .lane-subtitle {
        fill: #64748B;
        font-size: 14px;
        font-weight: 520;
      }
      .box-title {
        fill: #142033;
        font-size: 18px;
        font-weight: 740;
      }
      .box-text {
        fill: #334155;
        font-size: 15px;
        font-weight: 430;
      }
      .box-muted {
        fill: #64748B;
        font-size: 13px;
        font-weight: 430;
      }
      .code {
        fill: #1E293B;
        font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
        font-size: 13px;
        font-weight: 520;
      }
      .small-code {
        fill: #475569;
        font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
        font-size: 12px;
      }
      .summary-title {
        fill: #0F172A;
        font-size: 16px;
        font-weight: 740;
      }
      .summary-text {
        fill: #334155;
        font-size: 14px;
      }
      .footer {
        fill: #64748B;
        font-size: 12px;
      }
      .lane-left {
        fill: #EEF6FF;
        stroke: #B8D8F2;
      }
      .lane-mid {
        fill: #FFF7E8;
        stroke: #F1D093;
      }
      .lane-right {
        fill: #EFFAF3;
        stroke: #BDE3C8;
      }
      .card {
        fill: #FFFFFF;
        stroke-width: 1.5;
        rx: 8;
        filter: url(#soft-shadow);
      }
      .card-blue {
        stroke: #78B2DF;
      }
      .card-gold {
        stroke: #E2B45C;
      }
      .card-green {
        stroke: #8BCB9A;
      }
      .card-warning {
        fill: #FFF7ED;
        stroke: #F97316;
      }
      .card-muted {
        fill: #F8FAFC;
        stroke: #CBD5E1;
      }
      .arrow-blue {
        stroke: #2563EB;
        stroke-width: 3.2;
        fill: none;
        marker-end: url(#arrow-blue);
      }
      .arrow-gold {
        stroke: #B7791F;
        stroke-width: 3.2;
        fill: none;
        marker-end: url(#arrow-gold);
      }
      .arrow-green {
        stroke: #17803D;
        stroke-width: 3.2;
        fill: none;
        marker-end: url(#arrow-green);
      }
      .arrow-red {
        stroke: #DC2626;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow-red);
      }
      .arrow-dashed {
        stroke-dasharray: 9 8;
      }
      .thin {
        stroke-width: 2.4;
      }
    </style>
  </defs>

  <rect width="1800" height="1260" fill="url(#page-bg)"/>

  <rect x="48" y="31" width="214" height="32" rx="16" fill="#E2E8F0" stroke="#CBD5E1"/>
  <text class="badge" x="69" y="53">EnhancedHairCards</text>
  <text class="title" x="48" y="101">Groom Card Sim: inherit original UE deformation, keep custom rendering</text>
  <text class="subtitle" x="50" y="132">当前实现目标：Source Groom 继续跑 UE 原版 Groom Cards sim/deformation，EnhancedHairCards 读取其变形缓冲并走自己的渲染路径。</text>

  <rect class="lane-left" x="48" y="165" width="532" height="805" rx="18" stroke-width="1.4"/>
  <rect class="lane-mid" x="634" y="165" width="532" height="805" rx="18" stroke-width="1.4"/>
  <rect class="lane-right" x="1220" y="165" width="532" height="805" rx="18" stroke-width="1.4"/>

  <text class="lane-title" x="86" y="212">EnhancedHairCards custom render</text>
  <text class="lane-subtitle" x="87" y="236">插件组件、VF、材质和 MeshBatch 保持自定义</text>

  <text class="lane-title" x="672" y="212">Source Groom buffer bridge</text>
  <text class="lane-subtitle" x="673" y="236">按 Group / LOD 从原版 Groom Cards 资源取 SRV</text>

  <text class="lane-title" x="1258" y="212">Original UE Groom Cards sim</text>
  <text class="lane-subtitle" x="1259" y="236">UE HairStrands / GroomManager 负责真实 cards deformation</text>

  <!-- Left lane: Enhanced custom rendering -->
  <rect class="card card-blue" x="86" y="272" width="456" height="124"/>
  <text class="box-title" x="113" y="309">UEnhancedHairCardsComponent</text>
  <text class="box-text" x="113" y="339">
    <tspan x="113" dy="0">持有插件资产、材质覆盖、debug / preview 设置。</tspan>
    <tspan x="113" dy="23">新增 SourceGroomComponent 指向原版 Groom。</tspan>
  </text>
  <text class="small-code" x="113" y="374">bUseSourceGroomSimulation / SourceGroupIndex / SourceLODIndex</text>

  <rect class="card card-blue" x="86" y="456" width="456" height="132"/>
  <text class="box-title" x="113" y="493">FEnhancedHairCardsSceneProxy</text>
  <text class="box-text" x="113" y="523">
    <tspan x="113" dy="0">渲染线程优先尝试绑定 Source Groom cards 资源。</tspan>
    <tspan x="113" dy="23">资源不完整时切回插件原有静态/本地 guide 路径。</tspan>
  </text>
  <text class="small-code" x="113" y="560">BindSourceGroomCardsResource()</text>

  <rect class="card card-blue" x="86" y="636" width="456" height="142"/>
  <text class="box-title" x="113" y="673">Enhanced cards rendering</text>
  <text class="box-text" x="113" y="703">
    <tspan x="113" dy="0">EnhancedHairCardsVertexFactory 读取已绑定 SRV。</tspan>
    <tspan x="113" dy="23">材质、排序、MeshBatch、调试开关仍由插件控制。</tspan>
  </text>
  <text class="small-code" x="113" y="748">custom render path, original simulation data</text>

  <rect class="card card-muted" x="86" y="826" width="456" height="90"/>
  <text class="box-title" x="113" y="861">Fallback</text>
  <text class="box-text" x="113" y="891">
    <tspan x="113" dy="0">Source Groom 未准备好或关闭时，继续使用 Enhanced</tspan>
    <tspan x="113" dy="21">静态 card mesh / 本地 guide preview，不阻塞渲染。</tspan>
  </text>

  <!-- Middle lane: bridge -->
  <rect class="card card-gold" x="672" y="272" width="456" height="124"/>
  <text class="box-title" x="699" y="309">SourceGroomComponent reference</text>
  <text class="box-text" x="699" y="339">
    <tspan x="699" dy="0">Actor、资产编辑器预览、Blueprint 导出都会写入引用。</tspan>
    <tspan x="699" dy="23">同 Actor 可自动寻找原版 UGroomComponent。</tspan>
  </text>
  <text class="small-code" x="699" y="374">SetSourceGroomComponent() / ComponentTemplate-&gt;SourceGroomComponent</text>

  <rect class="card card-gold" x="672" y="456" width="456" height="132"/>
  <text class="box-title" x="699" y="493">Group / LOD resolver</text>
  <text class="box-text" x="699" y="523">
    <tspan x="699" dy="0">解析 FHairGroupInstance::Cards.LODs[LOD]。</tspan>
    <tspan x="699" dy="23">严格检查 deformed、rest、index 资源是否有效。</tspan>
  </text>
  <text class="small-code" x="699" y="560">Cards.DeformedResource + Cards.RestResource + RestIndexBuffer</text>

  <rect class="card card-gold" x="672" y="636" width="456" height="142"/>
  <text class="box-title" x="699" y="673">Bound resources consumed by Enhanced</text>
  <text class="box-text" x="699" y="703">
    <tspan x="699" dy="0">Current / Previous position SRV、deformed normal SRV。</tspan>
    <tspan x="699" dy="23">Rest UV、material、vertex color SRV 和 rest index buffer。</tspan>
  </text>
  <text class="small-code" x="699" y="748">no CPU card copy, no duplicated UE cards deformation pass</text>

  <rect class="card card-warning" x="672" y="826" width="456" height="90"/>
  <text class="box-title" x="699" y="861">Visibility guard</text>
  <text class="box-text" x="699" y="891">
    <tspan x="699" dy="0">Source Groom 需要继续参与 HairStrands cards path，</tspan>
    <tspan x="699" dy="21">默认 bKeepSourceGroomVisibleForSimulation = true。</tspan>
  </text>

  <!-- Right lane: original UE Groom cards sim -->
  <rect class="card card-green" x="1258" y="272" width="456" height="124"/>
  <text class="box-title" x="1285" y="309">UGroomComponent / OriginalGroomCards</text>
  <text class="box-text" x="1285" y="339">
    <tspan x="1285" dy="0">使用原版 GroomAsset、cards representation 和绑定资产。</tspan>
    <tspan x="1285" dy="23">Actor 创建隐藏用途组件时强制 SetUseCards(true)。</tspan>
  </text>
  <text class="small-code" x="1285" y="374">SourceGroomSimulationComponent</text>

  <rect class="card card-green" x="1258" y="456" width="456" height="132"/>
  <text class="box-title" x="1285" y="493">UE HairStrands cards deformation</text>
  <text class="box-text" x="1285" y="523">
    <tspan x="1285" dy="0">GroomManager、Niagara guide sim、插值和 cards deformation。</tspan>
    <tspan x="1285" dy="23">保持 UE 原版 cards 运动、碰撞和 LOD 语义。</tspan>
  </text>
  <text class="small-code" x="1285" y="560">HairStrandsInterpolation / HairCardsDeformation</text>

  <rect class="card card-green" x="1258" y="636" width="456" height="142"/>
  <text class="box-title" x="1285" y="673">Cards LOD GPU buffers</text>
  <text class="box-text" x="1285" y="703">
    <tspan x="1285" dy="0">UE 每帧更新 deformed card vertex data。</tspan>
    <tspan x="1285" dy="23">Enhanced 只引用资源，不重建这套模拟。</tspan>
  </text>
  <text class="small-code" x="1285" y="748">FHairGroupInstance::Cards.LODs[SourceLODIndex]</text>

  <rect class="card card-muted" x="1258" y="826" width="456" height="90"/>
  <text class="box-title" x="1285" y="861">Engine-owned constraint</text>
  <text class="box-text" x="1285" y="891">
    <tspan x="1285" dy="0">当前没有独立调用 AddHairCardsDeformationPass；</tspan>
    <tspan x="1285" dy="21">Source Groom 被完全隐藏可能导致变形缓冲不更新。</tspan>
  </text>

  <!-- Vertical flow inside lanes -->
  <path class="arrow-blue thin" d="M 314 396 L 314 445"/>
  <path class="arrow-blue thin" d="M 314 588 L 314 625"/>
  <path class="arrow-blue thin arrow-dashed" d="M 314 778 L 314 815"/>

  <path class="arrow-gold thin" d="M 900 396 L 900 445"/>
  <path class="arrow-gold thin" d="M 900 588 L 900 625"/>
  <path class="arrow-red thin" d="M 900 778 L 900 815"/>

  <path class="arrow-green thin" d="M 1486 396 L 1486 445"/>
  <path class="arrow-green thin" d="M 1486 588 L 1486 625"/>
  <path class="arrow-green thin" d="M 1486 778 L 1486 815"/>

  <!-- Cross-lane ownership and data flow -->
  <path class="arrow-blue" d="M 542 334 C 586 334, 617 334, 662 334"/>
  <text class="box-muted" x="557" y="321">stores reference</text>

  <path class="arrow-gold" d="M 1128 334 C 1172 334, 1203 334, 1248 334"/>
  <text class="box-muted" x="1146" y="321">points to source</text>

  <path class="arrow-green" d="M 1258 707 C 1211 707, 1173 707, 1128 707"/>
  <text class="box-muted" x="1156" y="694">GPU SRVs</text>

  <path class="arrow-gold" d="M 672 707 C 625 707, 587 707, 542 707"/>
  <text class="box-muted" x="560" y="694">bind into VF</text>

  <path class="arrow-red arrow-dashed" d="M 1128 871 C 1178 856, 1209 856, 1258 871"/>
  <text class="box-muted" x="1149" y="845">keep updating</text>

  <path class="arrow-gold arrow-dashed" d="M 672 750 C 610 782, 577 845, 542 870"/>
  <text class="box-muted" x="556" y="812">fallback when invalid</text>

  <!-- Summary strip -->
  <rect x="48" y="1000" width="1704" height="176" rx="14" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#soft-shadow)"/>
  <rect x="80" y="1030" width="378" height="116" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text class="summary-title" x="108" y="1062">Current conclusion</text>
  <text class="summary-text" x="108" y="1092">
    <tspan x="108" dy="0">Enhanced 优先直接绑定原版 Groom Cards</tspan>
    <tspan x="108" dy="22">deformed buffers；这不是重新实现一套 sim。</tspan>
  </text>

  <rect x="496" y="1030" width="378" height="116" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text class="summary-title" x="524" y="1062">What stays custom</text>
  <text class="summary-text" x="524" y="1092">
    <tspan x="524" dy="0">EnhancedHairCardsVertexFactory、材质覆盖、</tspan>
    <tspan x="524" dy="22">MeshBatch、调试显示仍然走插件渲染链路。</tspan>
  </text>

  <rect x="912" y="1030" width="378" height="116" rx="8" fill="#FFF7ED" stroke="#FDBA74"/>
  <text class="summary-title" x="940" y="1062">Required runtime condition</text>
  <text class="summary-text" x="940" y="1092">
    <tspan x="940" dy="0">Source Groom 必须持续进入 UE cards deformation；</tspan>
    <tspan x="940" dy="22">隐藏它可能让 deformed buffer 停止更新。</tspan>
  </text>

  <rect x="1328" y="1030" width="378" height="116" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text class="summary-title" x="1356" y="1062">Remaining limitation</text>
  <text class="summary-text" x="1356" y="1092">
    <tspan x="1356" dy="0">尚未把 UE HairCardsDeformation RDG pass</tspan>
    <tspan x="1356" dy="22">独立迁入 Enhanced；当前依赖 Source Groom。</tspan>
  </text>

  <text class="footer" x="48" y="1222">
    Local source basis: Plugins/EnhancedHairCards/Source + Shaders, UE GroomComponent / HairStrandsInterpolation / HairCardsDeformation. Updated 2026-05-09.
  </text>
</svg>
