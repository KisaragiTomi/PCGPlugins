<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CS Landscape Edit System</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #0d1117;
    }
    .wrap {
      padding: 24px;
      box-sizing: border-box;
    }
    object, img {
      display: block;
      width: min(100%, 1340px);
      height: auto;
      margin: 0 auto;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <object data="CSLandscapeSystem.svg" type="image/svg+xml">
      <img src="CSLandscapeSystem.svg" alt="CS Landscape Edit System" />
    </object>
  </div>
</body>
</html>
