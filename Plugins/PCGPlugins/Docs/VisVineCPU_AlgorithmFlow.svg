<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1300" role="img" aria-labelledby="title desc">
  <title id="title">VisVineCPU Algorithm Flow</title>
  <desc id="desc">Algorithm flow for AVineContainer::VisVineCPU. Surface projection, CurlNoise, PerlinNoise, smoothing, resample and final projection all run on the CPU game thread using a triangle BVH cache, then the prepared lines are swept into tube meshes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset=".5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #172033; }
      .mono { font-family: Consolas, "Cascadia Mono", monospace; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .phase { font-size: 15px; font-weight: 700; fill: #1e3a8a; }
      .nodeTitle { font-size: 14px; font-weight: 700; }
      .body { font-size: 11.5px; fill: #334155; }
      .tiny { font-size: 10px; fill: #64748b; }
      .tag { font-size: 10px; font-weight: 700; }
      .cpu { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.35; }
      .cpuCore { fill: #c7d7fe; stroke: #4338ca; stroke-width: 1.6; }
      .data { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.1; }
      .io { fill: #fef3c7; stroke: #d97706; stroke-width: 1.25; }
      .mesh { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.25; }
      .warn { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.1; }
      .arrow { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .arrowWarnLine { stroke: #dc2626; stroke-width: 1.1; fill: none; marker-end: url(#arrowWarn); }
    </style>
  </defs>

  <rect width="1240" height="1300" fill="#f8fafc"/>

  <rect x="36" y="24" width="1168" height="100" rx="10" fill="url(#headerGrad)" stroke="#cbd5e1"/>
  <text class="title" x="620" y="64" text-anchor="middle">VisVineCPU Algorithm Flow</text>
  <text class="subtitle mono" x="620" y="90" text-anchor="middle">AVineContainer::VisVine(MainVine, false) -&gt; VisVineCPU()</text>
  <text class="tiny" x="620" y="112" text-anchor="middle">Projection / CurlNoise / PerlinNoise / smooth / resample / final-projection all run on the CPU game thread (triangle BVH cache)</text>

  <g transform="translate(54 138)">
    <rect class="cpu" x="0" y="0" width="16" height="16" rx="3"/><text class="body" x="22" y="13">CPU game thread</text>
    <rect class="cpuCore" x="170" y="0" width="16" height="16" rx="3"/><text class="body" x="192" y="13">CPU core loop</text>
    <rect class="data" x="330" y="0" width="16" height="16" rx="3"/><text class="body" x="352" y="13">Data</text>
    <rect class="io" x="430" y="0" width="16" height="16" rx="3"/><text class="body" x="452" y="13">Entry / Output</text>
    <rect class="mesh" x="580" y="0" width="16" height="16" rx="3"/><text class="body" x="602" y="13">Mesh build</text>
    <rect class="warn" x="710" y="0" width="16" height="16" rx="3"/><text class="body" x="732" y="13">Fail / early return</text>
  </g>

  <!-- ENTRY -->
  <rect class="io" x="380" y="178" width="480" height="46" rx="8"/>
  <text class="nodeTitle" x="620" y="200" text-anchor="middle">Entry: VisVine(bUseGPU = false)</text>
  <text class="body mono" x="620" y="217" text-anchor="middle">bUseGPUMode = false  -&gt;  VisVineCPU()</text>
  <path class="arrow" d="M620,224 L620,246"/>

  <!-- VALIDATE -->
  <rect class="cpu" x="360" y="248" width="520" height="70" rx="8"/>
  <text class="nodeTitle" x="620" y="269" text-anchor="middle">Pre-checks</text>
  <text class="body" x="620" y="288" text-anchor="middle">TubeLines non-empty - ResampleLength &gt; 0 - CurveControl lazy-create</text>
  <text class="body" x="620" y="305" text-anchor="middle">DynamicMeshComponent and ContainerMesh both valid</text>
  <rect class="warn" x="906" y="252" width="124" height="62" rx="7"/>
  <text class="tag" x="968" y="278" text-anchor="middle" fill="#b91c1c">any fails</text>
  <text class="body" x="968" y="296" text-anchor="middle">return false</text>
  <path class="arrowWarnLine" d="M880,283 L902,283"/>
  <path class="arrow" d="M620,318 L620,340"/>

  <!-- BVH CACHE -->
  <rect class="cpu" x="360" y="342" width="520" height="82" rx="8"/>
  <text class="nodeTitle" x="620" y="363" text-anchor="middle">Build triangle BVH projection cache</text>
  <text class="body" x="620" y="382" text-anchor="middle">BuildVineTriangleBVHProjectionCache(CachedSurfaceTriangles)</text>
  <text class="body" x="620" y="400" text-anchor="middle">if invalid: refresh GetBoxSceneTrianglesFromGPUFiltered(0), rebuild</text>
  <text class="tiny" x="620" y="416" text-anchor="middle">still invalid -&gt; return false</text>
  <path class="arrow" d="M620,424 L620,454"/>

  <!-- PHASE BAND -->
  <rect x="284" y="456" width="672" height="438" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.3" stroke-dasharray="7 5"/>
  <text class="phase" x="620" y="480" text-anchor="middle">PrepareVVLinesProjected("CPU_BVH")  --  line preprocessing (CPU)</text>

  <rect class="cpuCore" x="308" y="494" width="624" height="60" rx="8"/>
  <text class="nodeTitle" x="620" y="515" text-anchor="middle">(1) buildWorking - assemble working lines</text>
  <text class="body" x="620" y="534" text-anchor="middle">ClonePolyPath - ApplyVVSCPointOffset(source offset) - BuildPreparedLinePointScales</text>
  <text class="tiny" x="620" y="549" text-anchor="middle">per line: WorkingLines / source scale / per-point scale</text>
  <path class="arrow" d="M620,554 L620,572"/>

  <rect class="cpuCore" x="308" y="574" width="624" height="120" rx="8"/>
  <text class="nodeTitle" x="620" y="595" text-anchor="middle">(2) noiseProject - projection + noise (per line)</text>
  <text class="body" x="620" y="614" text-anchor="middle">SmoothLine(3) -&gt; ResampleByLength(ResampleLength)</text>
  <text class="body" x="620" y="632" text-anchor="middle">10x loop: BVH project back to surface + CurlNoise + PerlinNoise eval + resample</text>
  <text class="body" x="620" y="650" text-anchor="middle">one more CurlNoise pass at the end</text>
  <text class="tiny" x="620" y="668" text-anchor="middle">push first 80% points of each line into SampleRangePointsSum (global sample set)</text>
  <text class="tiny" x="620" y="684" text-anchor="middle">lines with &lt; 2 segments are skipped</text>
  <path class="arrow" d="M620,694 L620,712"/>

  <rect class="cpuCore" x="308" y="714" width="624" height="54" rx="8"/>
  <text class="nodeTitle" x="620" y="735" text-anchor="middle">(3) reduceSample - shrink sample set</text>
  <text class="body" x="620" y="754" text-anchor="middle">sort by spatial key -&gt; keep only 1/15 (ReducedSampleCount)</text>
  <path class="arrow" d="M620,768 L620,786"/>

  <rect class="cpuCore" x="308" y="788" width="624" height="86" rx="8"/>
  <text class="nodeTitle" x="620" y="809" text-anchor="middle">(4) mergeFinalProject - final projection</text>
  <text class="body" x="620" y="828" text-anchor="middle">per line re-project (+ VinesOffset*normal + tiny Z jitter) -&gt; ResampleByLength -&gt; SmoothLine(1)</text>
  <text class="body" x="620" y="846" text-anchor="middle">final projection -&gt; write OutLines / OutLineSourceScales / OutLinePointScales</text>
  <text class="tiny" x="620" y="864" text-anchor="middle">RebuildVinePointScalesForEditedLine keeps per-point scale aligned</text>

  <path class="arrow" d="M620,894 L620,916"/>

  <!-- SWEEP -->
  <rect class="mesh" x="350" y="918" width="540" height="86" rx="8"/>
  <text class="nodeTitle" x="620" y="939" text-anchor="middle">Sweep tube mesh (per PreparedLine)</text>
  <text class="body" x="620" y="958" text-anchor="middle">scale each point by CurveControl.G x PointScale (Transform.Scale3D)</text>
  <text class="body" x="620" y="976" text-anchor="middle">ConvertPolyPathToTransforms -&gt; AppendSweepPolygon(triangle cross-section)</text>
  <text class="tiny" x="620" y="993" text-anchor="middle">lines with TransformCount &lt; 3 skipped; accumulate into VineMesh</text>
  <rect class="warn" x="916" y="922" width="112" height="78" rx="7"/>
  <text class="tag" x="972" y="950" text-anchor="middle" fill="#b91c1c">triangles = 0</text>
  <text class="body" x="972" y="970" text-anchor="middle">return</text>
  <text class="body" x="972" y="986" text-anchor="middle">false</text>
  <path class="arrowWarnLine" d="M890,961 L912,961"/>
  <path class="arrow" d="M620,1004 L620,1026"/>

  <!-- APPEND -->
  <rect class="mesh" x="360" y="1028" width="520" height="74" rx="8"/>
  <text class="nodeTitle" x="620" y="1049" text-anchor="middle">Append into container mesh</text>
  <text class="body" x="620" y="1068" text-anchor="middle">AppendMesh(ContainerMesh, VineMesh)</text>
  <text class="body" x="620" y="1086" text-anchor="middle">set MaterialID = 0 on new triangles (TriID &gt;= PreviousMax)</text>
  <path class="arrow" d="M620,1102 L620,1124"/>

  <!-- FINALIZE -->
  <rect class="cpu" x="360" y="1126" width="520" height="80" rx="8"/>
  <text class="nodeTitle" x="620" y="1147" text-anchor="middle">Localize + refresh render</text>
  <text class="body" x="620" y="1166" text-anchor="middle">TransformDynamicMeshToLocalSpace(component transform)</text>
  <text class="body" x="620" y="1184" text-anchor="middle">NotifyMeshUpdated - UpdateBounds - MarkRenderTransform/StateDirty</text>
  <text class="tiny" x="620" y="1200" text-anchor="middle">[VisVineCPU] Appended tube vine mesh ...</text>
  <path class="arrow" d="M620,1206 L620,1228"/>

  <!-- DONE -->
  <rect class="io" x="448" y="1230" width="344" height="44" rx="8"/>
  <text class="nodeTitle" x="620" y="1257" text-anchor="middle">return true</text>
</svg>