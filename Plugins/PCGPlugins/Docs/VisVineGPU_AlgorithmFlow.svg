<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 2110" role="img" aria-labelledby="title desc">
  <title id="title">VisVineGPU Algorithm Flow</title>
  <desc id="desc">Algorithm flow for AVineContainer::VisVineGPUInternal. CPU smooths/resamples lines only — surface projection, CurlNoise, PerlinNoise, smoothing, final projection, optional surface resample, tangent rebuild and tangent smoothing all run on the GPU inside DispatchVVGPU_Voxel.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGpu" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#15803d"/>
    </marker>
    <marker id="arrowWarn" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset=".48" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #172033; }
      .mono { font-family: Consolas, "Cascadia Mono", monospace; }
      .title { font-size: 29px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #475569; }
      .phase { font-size: 16px; font-weight: 700; }
      .nodeTitle { font-size: 13px; font-weight: 700; }
      .body { font-size: 11px; fill: #334155; }
      .tiny { font-size: 10px; fill: #64748b; }
      .tag { font-size: 10px; font-weight: 700; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .cpu { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.35; }
      .gpu { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.35; }
      .gpuNoise { fill: #ecfdf5; stroke: #059669; stroke-width: 1.35; }
      .gpuPerlin { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.35; }
      .data { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.1; }
      .io { fill: #fef3c7; stroke: #d97706; stroke-width: 1.25; }
      .mesh { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.25; }
      .warn { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.1; }
      .softCpu { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
      .softGpu { fill: #f0fdf4; stroke: #86efac; stroke-width: 1; }
      .softData { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .arrow { stroke: #334155; stroke-width: 1.55; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #334155; stroke-width: 1.15; fill: none; marker-end: url(#arrow); }
      .arrowGpuLine { stroke: #15803d; stroke-width: 1.45; fill: none; marker-end: url(#arrowGpu); }
      .arrowWarnLine { stroke: #dc2626; stroke-width: 1.1; fill: none; marker-end: url(#arrowWarn); }
      .dash { stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect width="1440" height="2110" fill="#f8fafc"/>

  <!-- ===== HEADER ===== -->
  <rect x="36" y="26" width="1368" height="104" rx="10" fill="url(#headerGrad)" stroke="#cbd5e1"/>
  <text class="title" x="720" y="67" text-anchor="middle">VisVineGPU 算法流程</text>
  <text class="subtitle mono" x="720" y="94" text-anchor="middle">AVineContainer::VisVine(MainVine, true) -&gt; VisVineGPUInternal()</text>
  <text class="tiny" x="720" y="116" text-anchor="middle">CPU 只做线条平滑重采样；表面投射、CurlNoise、PerlinNoise、平滑、最终投射、切线重建/平滑统一在 GPU 完成 (DispatchVVGPU_Voxel)</text>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(58 150)">
    <rect class="cpu" x="0" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="27" y="14">CPU / Game Thread</text>
    <rect class="gpu" x="188" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="215" y="14">GPU Compute / RDG</text>
    <rect class="gpuNoise" x="390" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="417" y="14">GPU CurlNoise</text>
    <rect class="gpuPerlin" x="560" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="587" y="14">GPU PerlinNoise</text>
    <rect class="data" x="730" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="757" y="14">结构化数据</text>
    <rect class="io" x="872" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="899" y="14">Readback</text>
    <rect class="mesh" x="1008" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="1035" y="14">DynamicMesh 输出</text>
    <rect class="warn" x="1224" y="0" width="18" height="18" rx="3"/>
    <text class="body" x="1251" y="14">失败返回 false</text>
  </g>

  <!-- ===== PHASE 0: 入口与校验 ===== -->
  <rect class="band" x="54" y="194" width="1332" height="156" rx="9"/>
  <text class="phase" x="80" y="224" fill="#1d4ed8">0. 入口、分支选择、必要校验</text>

  <rect class="cpu" x="82" y="246" width="238" height="56" rx="7"/>
  <text class="nodeTitle mono" x="201" y="268" text-anchor="middle">VisVine(MainVine, true)</text>
  <text class="tiny" x="201" y="286" text-anchor="middle">bUseGPU 为 true 时进入 GPU 分支</text>

  <path class="arrowThin" d="M320 274 H368"/>
  <rect class="cpu" x="370" y="238" width="350" height="72" rx="7"/>
  <text class="nodeTitle mono" x="545" y="261" text-anchor="middle">VisVineGPUInternal()</text>
  <text class="body" x="394" y="281">Lines = TubeLines（仅处理 Tube，无 Plane 分支）</text>
  <text class="tiny" x="394" y="297">同步选择 SourceScales / Locations / PointScales</text>

  <path class="arrowThin" d="M720 274 H760"/>
  <rect class="warn" x="762" y="232" width="592" height="86" rx="7"/>
  <text class="nodeTitle" x="786" y="254">提前失败条件</text>
  <text class="body" x="786" y="274">Lines 为空，VV.ResampleLength 无效，DynamicMeshComponent 或 ContainerMesh 无效</text>
  <text class="body" x="786" y="292">CachedSurfaceVoxels.Cells 为空（由 GenerateVines 在之前填充）</text>
  <path class="arrowWarnLine dash" d="M1268 318 V332"/>

  <path class="arrow" d="M720 350 V378"/>

  <!-- ===== PHASE 1: CPU 线预处理（仅平滑重采样） ===== -->
  <rect class="band" x="54" y="378" width="1332" height="266" rx="9"/>
  <text class="phase" x="80" y="408" fill="#1d4ed8">1. CPU 线预处理：仅平滑 + 重采样（无表面投射、无噪声 — 全部移至 GPU）</text>

  <rect class="data" x="82" y="428" width="220" height="130" rx="7"/>
  <text class="nodeTitle" x="104" y="452">输入线与参数</text>
  <text class="body" x="104" y="472">TubeLines</text>
  <text class="body" x="104" y="490">VV: ResampleLength, Noise</text>
  <text class="body" x="104" y="508">CurveControl: R/G/B 通道</text>
  <text class="body" x="104" y="526">SC source location / scale</text>
  <text class="tiny" x="104" y="548">不再需要 BVH 缓存 — 投射全在 GPU</text>

  <path class="arrowThin" d="M302 493 H344"/>

  <rect class="cpu" x="346" y="428" width="620" height="190" rx="7"/>
  <text class="nodeTitle mono" x="656" y="454" text-anchor="middle">VisVineGPUInternal 内联线预处理（无 CPU 投射）</text>

  <rect class="softCpu" x="368" y="474" width="130" height="28" rx="4"/>
  <text class="tag" x="433" y="492" text-anchor="middle">clone + SC offset</text>
  <path class="arrowThin" d="M498 488 H530"/>
  <rect class="softCpu" x="532" y="474" width="120" height="28" rx="4"/>
  <text class="tag" x="592" y="492" text-anchor="middle">SmoothLine(3)</text>
  <path class="arrowThin" d="M652 488 H684"/>
  <rect class="softCpu" x="686" y="474" width="154" height="28" rx="4"/>
  <text class="tag" x="763" y="492" text-anchor="middle">ResamppleByLength</text>

  <rect class="warn" x="368" y="518" width="472" height="46" rx="5"/>
  <text class="tag" x="604" y="536" text-anchor="middle">⚠ 不再做 CPU 表面投射、CurlNoise / PerlinNoise、Plane merge</text>
  <text class="tiny" x="604" y="554" text-anchor="middle">以上操作全部移至 GPU: ApplyVVNoiseCS + ApplyVVPerlinNoiseCS</text>

  <rect class="softCpu" x="368" y="578" width="472" height="26" rx="5"/>
  <text class="tag" x="604" y="595" text-anchor="middle">输出: 仅平滑重采样后的 PreparedLines / Scales（点未吸附到表面）</text>

  <path class="arrowThin" d="M966 523 H1016"/>

  <rect class="data" x="1018" y="428" width="242" height="140" rx="7"/>
  <text class="nodeTitle" x="1139" y="452" text-anchor="middle">PreparedLines / Scales</text>
  <text class="body" x="1040" y="478">平滑 + 重采样后的中心线</text>
  <text class="body" x="1040" y="496">点未经过投射（原始位置）</text>
  <text class="tiny" x="1040" y="520">每点 scale = CurveControl.G × pointScale</text>
  <text class="tiny" x="1040" y="536">VisVineGPUNoiseIterations (默认 10) 控制</text>
  <text class="tiny" x="1040" y="550">GPU voxel + CurlNoise + PerlinNoise</text>

  <path class="arrow" d="M720 644 V678"/>

  <!-- ===== PHASE 2: GPU 输入打包 ===== -->
  <rect class="band" x="54" y="678" width="1332" height="244" rx="9"/>
  <text class="phase" x="80" y="708" fill="#1d4ed8">2. GPU 输入打包（轴向交给 GPU 计算）</text>

  <rect class="cpu" x="82" y="728" width="286" height="156" rx="7"/>
  <text class="nodeTitle mono" x="225" y="752" text-anchor="middle">PreparedLinePointAxes = 空数组</text>
  <text class="body" x="104" y="780">CPU 端不再构建 axis 数据</text>
  <text class="body" x="104" y="798">所有切线由 GPU Pass A 从</text>
  <text class="body" x="104" y="816">noised 点计算，并在 Pass PT</text>
  <text class="body" x="104" y="834">基于最终 surface target 重建</text>
  <text class="body" x="104" y="852">再由 Pass AS 做切线平滑</text>
  <text class="tiny" x="104" y="876">VisVineGPUAxisSmoothIterations 控制平滑次数</text>

  <path class="arrowThin" d="M368 806 H410"/>
  <rect class="cpu" x="412" y="728" width="300" height="174" rx="7"/>
  <text class="nodeTitle mono" x="562" y="752" text-anchor="middle">BuildVVGPUInput()</text>
  <text class="body" x="434" y="776">PathPoints: xyz + scale</text>
  <text class="body" x="434" y="794">PathPointAxes: 初始轴向种子</text>
  <text class="body" x="434" y="812">PathPointMeta: prev/next/base/count</text>
  <text class="body" x="434" y="830">PathPointCurveU: 累积长度</text>
  <text class="body" x="434" y="848">SegmentMeta: 每段两端点</text>
  <text class="tiny" x="434" y="872">scale = CurveControl.G × point scale</text>
  <text class="tiny" x="434" y="888">输入点未投射 — GPU Pass N 做投射</text>

  <rect class="data" x="772" y="728" width="582" height="174" rx="7"/>
  <text class="nodeTitle" x="1063" y="752" text-anchor="middle">DispatchVVGPU_Voxel 入参</text>
  <text class="body" x="794" y="776">CircleScale, LineScale, VinesOffset, TinyZJitter = 0.1</text>
  <text class="body" x="794" y="794">AxisSmoothIterations / PostProjectionSmoothIterations</text>
  <text class="body" x="794" y="812">PostProjectionSmoothKernelRadius / PostProjectionSmallSmoothIterations</text>
  <text class="body" x="794" y="830">CurlNoiseScale/10, CurlNoiseFre, PerlinNoiseScale, PerlinNoiseFre</text>
  <text class="body" x="794" y="848">VisVineGPUNoiseIterations, CachedSurfaceVoxels</text>
  <text class="tiny" x="794" y="872">bTube = true（Tube 截面）</text>
  <text class="tiny" x="794" y="888">输出: OutVertices / OutUVs / OutIndices / SurfaceTargets</text>

  <path class="arrowThin" d="M712 815 H770"/>
  <path class="arrow" d="M712 902 V962"/>

  <!-- ===== PHASE 3: GPU 核心 ===== -->
  <rect class="band" x="54" y="962" width="1332" height="902" rx="9"/>
  <text class="phase" x="80" y="992" fill="#15803d">3. GPU 统一计算: CurlNoise投射 → 建轴 → PerlinNoise → 最终投射 → 表面重采样 → 平滑 → 重建切线 → 平滑切线 → 变形扫掠</text>

  <!-- CPU-side voxel preparation -->
  <rect class="cpu" x="82" y="1014" width="572" height="138" rx="7"/>
  <text class="nodeTitle" x="368" y="1038" text-anchor="middle">DispatchVVGPU_Voxel (CPU 侧准备)</text>

  <rect class="softCpu" x="104" y="1056" width="170" height="42" rx="5"/>
  <text class="tag" x="189" y="1074" text-anchor="middle">Sanitize voxels</text>
  <text class="tiny" x="189" y="1090" text-anchor="middle">非法 target/normal 回退统计</text>

  <path class="arrowThin" d="M274 1076 H294"/>
  <rect class="softCpu" x="296" y="1056" width="170" height="42" rx="5"/>
  <text class="tag" x="381" y="1074" text-anchor="middle">BuildVoxelHashSlots</text>
  <text class="tiny" x="381" y="1090" text-anchor="middle">cell→voxel index 哈希表</text>

  <path class="arrowThin" d="M466 1076 H486"/>
  <rect class="softCpu" x="488" y="1056" width="144" height="42" rx="5"/>
  <text class="tag" x="560" y="1074" text-anchor="middle">BuildTargetBuckets</text>
  <text class="tiny" x="560" y="1090" text-anchor="middle">位置桶加速结构</text>

  <rect class="softData" x="160" y="1112" width="436" height="28" rx="5"/>
  <text class="tag" x="378" y="1130" text-anchor="middle">上传 RDG buffers: Cells / HashSlots / Normals / TargetPositions / TargetBuckets</text>

  <path class="arrowGpuLine" d="M654 1083 H700"/>

  <!-- GPU side -->
  <rect class="gpu" x="702" y="1014" width="642" height="778" rx="8"/>

  <!-- Pass N: CurlNoise Loop -->
  <rect class="gpuNoise" x="728" y="1036" width="590" height="64" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1058" text-anchor="middle">Pass N: ApplyVVNoiseCS（CurlNoise + 投射循环）</text>
  <text class="body" x="748" y="1078">每点一线程: VoxelProjection (FindNearestVoxelSample → 吸附表面 target) → CurlNoise</text>
  <text class="tiny" x="748" y="1093">循环 NoiseIterations (默认 10) 次，输出 PathPointsNoised（下游几何源）</text>

  <path class="arrowGpuLine" d="M1023 1100 V1116"/>

  <!-- Pass A: BuildAxes -->
  <rect class="softGpu" x="728" y="1116" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1138" text-anchor="middle">Pass A: BuildVVVoxelAxesCS</text>
  <text class="tiny" x="1023" y="1158" text-anchor="middle">从 noised 点计算 tangent / surfaceTarget / surfaceNormal（写入 A 组缓冲）</text>

  <path class="arrowGpuLine" d="M1023 1174 V1190"/>

  <!-- Pass P: PerlinNoise -->
  <rect class="gpuPerlin" x="728" y="1190" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1212" text-anchor="middle">Pass P: ApplyVVPerlinNoiseCS</text>
  <text class="tiny" x="1023" y="1232" text-anchor="middle">沿 SurfaceNormal 偏移 SurfaceTarget: offset = PerlinNoiseScale × PerlinNoise3D(Target × Fre/100)</text>

  <path class="arrowGpuLine" d="M1023 1248 V1264"/>

  <!-- Pass FP: Final Surface Projection (now before smoothing) -->
  <rect class="gpu" x="728" y="1264" width="590" height="60" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1286" text-anchor="middle">Pass FP: FinalProjectVVVoxelCS（最终表面投射 + VinesOffset 外推）</text>
  <text class="tiny" x="1023" y="1306" text-anchor="middle">将 Perlin 偏移后的点用 voxel (FindNearestVoxelSample) 投回表面，得 Surface Target / Normal，再沿法线外推 VinesOffset 作为最终中心线</text>

  <path class="arrowGpuLine" d="M1023 1324 V1340"/>

  <!-- Pass RS: Surface resample (uniform arc-length), now BEFORE smoothing -->
  <rect class="softGpu" x="728" y="1340" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1362" text-anchor="middle">Pass RS: ResampleVVSurfaceCS（最终投射后、平滑前）</text>
  <text class="tiny" x="1023" y="1382" text-anchor="middle">bVisVineGPUResampleSurfaceEnabled 开启时，按弧长把各 vine 的 SurfaceTarget/Normal 等距重分布（点数不变，端点锚定）</text>

  <path class="arrowGpuLine" d="M1023 1398 V1414"/>

  <!-- Pass B: Smooth path ping-pong (now smooths the resampled surface, two-stage) -->
  <rect class="softGpu" x="728" y="1414" width="590" height="72" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1436" text-anchor="middle">Pass B: SmoothVVVoxelPathCS（两段 ping-pong）</text>
  <text class="tiny" x="1023" y="1455" text-anchor="middle">宽核段 ×PostProjectionSmoothIterations（半径 PostProjectionSmoothKernelRadius）抹平 Z 折痕</text>
  <text class="tiny" x="1023" y="1471" text-anchor="middle">后接 radius-1 清理段 ×PostProjectionSmallSmoothIterations，平滑重采样后的 SurfaceTarget / SurfaceNormal</text>

  <path class="arrowGpuLine" d="M1023 1486 V1502"/>

  <!-- Pass PT: Rebuild tangents + parallel-transport roll axis -->
  <rect class="softGpu" x="728" y="1502" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1524" text-anchor="middle">Pass PT: BuildVVParallelTransportFrameCS</text>
  <text class="tiny" x="1023" y="1544" text-anchor="middle">用最终 SurfaceTarget 重建 tangent，并沿每条线平行传输 roll 轴（仅起点用 surface normal 播种）以最小化扭曲</text>

  <path class="arrowGpuLine" d="M1023 1560 V1576"/>

  <!-- Pass AS: Axis (tangent) smoothing ping-pong -->
  <rect class="softGpu" x="728" y="1576" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1598" text-anchor="middle">Pass AS: SmoothVVTangentsCS × AxisSmoothIterations</text>
  <text class="tiny" x="1023" y="1618" text-anchor="middle">ping-pong 平滑 PathPointTangents（中心权重 2，邻居权重 1），紧接网格生成之前</text>

  <path class="arrowGpuLine" d="M1023 1634 V1650"/>

  <!-- Pass C: Build mesh -->
  <rect class="softGpu" x="728" y="1650" width="590" height="58" rx="6"/>
  <text class="nodeTitle mono" x="1023" y="1672" text-anchor="middle">Pass C: BuildVVVoxelCS（变形 + 扫掠出网格）</text>
  <text class="tiny" x="1023" y="1692" text-anchor="middle">Center = FinalTarget + FinalNormal × TinyZJitter（VinesOffset 已在 Pass FP 写入 FinalTarget）；Tube 截面 3 点三角；Jitter = Hash × 0.1</text>

  <rect class="softData" x="728" y="1720" width="590" height="50" rx="5"/>
  <text class="tag" x="1023" y="1740" text-anchor="middle">写出 RW_OutVertices / RW_OutUVs / RW_OutIndices + SurfaceTargets</text>
  <text class="tiny" x="1023" y="1758" text-anchor="middle">DispatchCount = max(OutputVertexCount, SegmentCount)，THREADGROUPSIZE_X = 64</text>

  <path class="arrowGpuLine" d="M1344 1774 V1936"/>

  <!-- ===== PHASE 4: Readback ===== -->
  <rect class="band" x="54" y="1884" width="1332" height="160" rx="9"/>
  <text class="phase" x="80" y="1914" fill="#92400e">4. GPU→CPU Readback, UV 修正, DynamicMesh 追加</text>

  <rect class="io" x="82" y="1936" width="286" height="86" rx="7"/>
  <text class="nodeTitle" x="104" y="1958">GPU → CPU readback</text>
  <text class="body" x="104" y="1978">ENQUEUE_RENDER_COMMAND 读回</text>
  <text class="body" x="104" y="1996">FRHIGPUBufferReadback: Vertices / UVs / Indices / SurfaceTargets</text>
  <text class="tiny" x="104" y="2014">FlushRenderingCommands，必要时 SubmitAndBlockUntilGPUIdle</text>

  <path class="arrowThin" d="M368 1979 H410"/>
  <rect class="cpu" x="412" y="1936" width="272" height="86" rx="7"/>
  <text class="nodeTitle" x="430" y="1958">CPU 后处理</text>
  <text class="body mono" x="430" y="1978">LogVineGPUProjectionStats()</text>
  <text class="body mono" x="430" y="1996">RecomputeVineOutputUVsFromGeneratedLength()</text>
  <text class="tiny" x="430" y="2014">按生成网格长度重算 UV V</text>

  <path class="arrowThin" d="M684 1979 H726"/>
  <rect class="mesh" x="728" y="1936" width="272" height="86" rx="7"/>
  <text class="nodeTitle" x="750" y="1958">Build DynamicMesh</text>
  <text class="body mono" x="750" y="1978">BuildDynamicMeshFromGPUVineOutput()</text>
  <text class="body" x="750" y="1996">过滤退化三角形，重算法线</text>
  <text class="tiny" x="750" y="2014">MaterialID: tube = 0</text>

  <path class="arrowThin" d="M1000 1979 H1042"/>
  <rect class="mesh" x="1044" y="1936" width="300" height="86" rx="7"/>
  <text class="nodeTitle" x="1066" y="1958">Append 到场景网格</text>
  <text class="body" x="1066" y="1978">AppendMesh(ContainerMesh, VineMesh)</text>
  <text class="body" x="1066" y="1996">TransformDynamicMeshToLocalSpace()</text>
