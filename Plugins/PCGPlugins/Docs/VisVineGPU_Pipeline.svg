<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1520" font-family="Consolas, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">AVineContainer::VisVineGPU(bool MainVine)</text>
  <text x="550" y="50" text-anchor="middle" font-size="12" fill="#64748b">GPU-accelerated vine sweep mesh generation pipeline</text>

  <!-- Legend -->
  <rect x="30" y="65" width="14" height="14" rx="2" fill="#dbeafe" stroke="#2563eb"/>
  <text x="50" y="77" font-size="10" fill="#1e293b">CPU (Game Thread)</text>
  <rect x="170" y="65" width="14" height="14" rx="2" fill="#dcfce7" stroke="#16a34a"/>
  <text x="190" y="77" font-size="10" fill="#1e293b">GPU Compute Shader</text>
  <rect x="340" y="65" width="14" height="14" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="77" font-size="10" fill="#1e293b">GPU ↔ CPU Readback</text>
  <rect x="510" y="65" width="14" height="14" rx="2" fill="#fce7f3" stroke="#db2777"/>
  <text x="530" y="77" font-size="10" fill="#1e293b">Error / Early Exit</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 1: Input Validation -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="95" width="980" height="65" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="115" font-size="12" font-weight="bold" fill="#1e40af">① Input Validation</text>
  <text x="80" y="132" font-size="10" fill="#334155">• Select Lines = MainVine ? TubeLines : PlaneLines</text>
  <text x="80" y="146" font-size="10" fill="#334155">• Check: Lines.Num() > 0, CurveControl != null, ContainerMesh valid, PrefixMesh valid</text>
  <text x="700" y="132" font-size="10" fill="#dc2626">→ return false if any check fails</text>

  <!-- Arrow -->
  <line x1="550" y1="160" x2="550" y2="175" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 2: BVH Rebuild -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="178" width="980" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="198" font-size="12" font-weight="bold" fill="#1e40af">② RebuildVineBVHForPrefixMesh</text>
  <text x="80" y="215" font-size="10" fill="#334155">Build BVH spatial index from PrefixMesh (collision surface) for nearest-point queries</text>

  <line x1="550" y1="228" x2="550" y2="243" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 3: PrepareVineVisualizationLinesCPU -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="246" width="980" height="100" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="266" font-size="12" font-weight="bold" fill="#1e40af">③ PrepareVineVisualizationLinesCPU (CPU preprocessing)</text>
  <text x="80" y="284" font-size="10" fill="#334155">For each PolyPath in Lines:</text>
  <rect x="100" y="290" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="200" y="305" text-anchor="middle" font-size="10" fill="#1e40af">SmoothLine(3)</text>
  <line x1="300" y1="301" x2="320" y2="301" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="322" y="290" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="422" y="305" text-anchor="middle" font-size="10" fill="#1e40af">ResampleByLength</text>
  <line x1="522" y1="301" x2="542" y2="301" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="544" y="290" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="644" y="305" text-anchor="middle" font-size="10" fill="#1e40af">SmoothLine(1)</text>
  <line x1="744" y1="301" x2="764" y2="301" stroke="#334155" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="766" y="290" width="200" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="866" y="305" text-anchor="middle" font-size="10" fill="#1e40af">ResampleByLength</text>
  <text x="80" y="335" font-size="10" fill="#6b7280">Filter: skip paths with ArcLength / ResampleLength &lt; 2 or final point count &lt; 3</text>

  <line x1="550" y1="346" x2="550" y2="361" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 4: BuildVineVisualizationGPUInput -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="364" width="980" height="130" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="384" font-size="12" font-weight="bold" fill="#1e40af">④ BuildVineVisualizationGPUInput (CPU → GPU buffer packing)</text>

  <rect x="80" y="395" width="280" height="85" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="220" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">PathPoints [float4 × N_pts]</text>
  <text x="220" y="428" text-anchor="middle" font-size="9" fill="#334155">xyz = world position</text>
  <text x="220" y="442" text-anchor="middle" font-size="9" fill="#334155">w = sweep scale (from CurveControl.G)</text>
  <text x="220" y="460" text-anchor="middle" font-size="9" fill="#6b7280">All paths concatenated sequentially</text>
  <text x="220" y="474" text-anchor="middle" font-size="9" fill="#6b7280">into one flat buffer</text>

  <rect x="390" y="395" width="280" height="85" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="530" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">PathPointMeta [int4 × N_pts]</text>
  <text x="530" y="428" text-anchor="middle" font-size="9" fill="#334155">x = prev point index (global)</text>
  <text x="530" y="442" text-anchor="middle" font-size="9" fill="#334155">y = next point index (global)</text>
  <text x="530" y="456" text-anchor="middle" font-size="9" fill="#334155">z = path base index</text>
  <text x="530" y="470" text-anchor="middle" font-size="9" fill="#334155">w = path point count</text>

  <rect x="700" y="395" width="280" height="85" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="840" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">SegmentMeta [int4 × N_seg]</text>
  <text x="840" y="428" text-anchor="middle" font-size="9" fill="#334155">x = start point index</text>
  <text x="840" y="442" text-anchor="middle" font-size="9" fill="#334155">y = end point index</text>
  <text x="840" y="456" text-anchor="middle" font-size="9" fill="#334155">z, w = reserved</text>
  <text x="840" y="474" text-anchor="middle" font-size="9" fill="#6b7280">One segment per consecutive pair</text>

  <line x1="550" y1="494" x2="550" y2="509" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 5: ExtractDynamicMeshTrianglesForGPU -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="512" width="980" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="532" font-size="12" font-weight="bold" fill="#1e40af">⑤ ExtractDynamicMeshTrianglesForGPU</text>
  <text x="80" y="549" font-size="10" fill="#334155">PrefixMesh → MeshTriangleVertices [float4 × N_tri×3] — flat triangle soup for GPU nearest-surface queries</text>
  <text x="80" y="562" font-size="9" fill="#6b7280">Each triangle = 3 consecutive float4 (xyz=position, w=1)</text>

  <line x1="550" y1="567" x2="550" y2="582" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 6: GPU Dispatch -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="585" width="980" height="310" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="80" y="607" font-size="13" font-weight="bold" fill="#166534">⑥ DispatchVineVisualizationGPU — FVineVisualizationMeshCS</text>
  <text x="80" y="623" font-size="10" fill="#334155">Single compute shader pass: builds sweep mesh vertices + indices on GPU</text>

  <!-- Input SRVs -->
  <rect x="80" y="635" width="440" height="90" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="300" y="652" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Input SRVs</text>
  <text x="100" y="668" font-size="9" fill="#334155">PathPoints (StructuredBuffer&lt;float4&gt;)</text>
  <text x="100" y="682" font-size="9" fill="#334155">PathPointMeta (StructuredBuffer&lt;int4&gt;)</text>
  <text x="100" y="696" font-size="9" fill="#334155">MeshTriangleVertices (StructuredBuffer&lt;float4&gt;)</text>
  <text x="100" y="710" font-size="9" fill="#334155">SegmentMeta (StructuredBuffer&lt;int4&gt;)</text>

  <!-- Output UAVs -->
  <rect x="560" y="635" width="440" height="90" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="780" y="652" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Output UAVs</text>
  <text x="580" y="668" font-size="9" fill="#334155">RW_OutVertices (RWStructuredBuffer&lt;float4&gt;) [N_pts × ProfileCount]</text>
  <text x="580" y="682" font-size="9" fill="#334155">RW_OutIndices (RWStructuredBuffer&lt;uint&gt;) [N_seg × ProfileCount × 6]</text>
  <text x="580" y="700" font-size="9" fill="#6b7280">Tube: ProfileCount=3 (triangle cross-section)</text>
  <text x="580" y="714" font-size="9" fill="#6b7280">Plane: ProfileCount=2 (flat ribbon cross-section)</text>

  <!-- Uniforms -->
  <rect x="80" y="735" width="920" height="55" rx="4" fill="#f0fdf4" stroke="#86efac"/>
  <text x="300" y="752" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Uniforms</text>
  <text x="100" y="768" font-size="9" fill="#334155">PathPointCount, SegmentCount, MeshTriangleCount, OutputVertexCount, OutputIndexCount</text>
  <text x="100" y="782" font-size="9" fill="#334155">ProfileCount, bTube, VinesOffset, CircleScale, LineScale</text>

  <!-- Shader logic -->
  <rect x="80" y="800" width="920" height="80" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.3"/>
  <text x="540" y="818" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Compute Shader Logic (per thread = per output vertex or segment)</text>
  <text x="100" y="836" font-size="9" fill="#334155">1. Read PathPoint position + scale, compute tangent from prev/next via PathPointMeta</text>
  <text x="100" y="850" font-size="9" fill="#334155">2. Find nearest triangle in MeshTriangleVertices → compute surface normal</text>
  <text x="100" y="864" font-size="9" fill="#334155">3. Build local frame (tangent × normal), offset by VinesOffset along normal</text>
  <text x="100" y="878" font-size="9" fill="#334155">4. Extrude cross-section profile (circle or line) at each point, write vertices + triangle indices</text>

  <line x1="550" y1="895" x2="550" y2="910" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 7: Readback -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="913" width="980" height="75" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="80" y="933" font-size="12" font-weight="bold" fill="#92400e">⑦ GPU → CPU Readback</text>
  <text x="80" y="950" font-size="10" fill="#334155">FlushRenderingCommands() → SubmitAndBlockUntilGPUIdle()</text>
  <text x="80" y="966" font-size="10" fill="#334155">Lock VertexReadback → Memcpy OutVertices[N_pts × ProfileCount]</text>
  <text x="80" y="982" font-size="10" fill="#334155">Lock IndexReadback → Memcpy OutIndices[N_seg × ProfileCount × 6]</text>

  <line x1="550" y1="988" x2="550" y2="1003" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 8: BuildDynamicMesh -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="1006" width="980" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="1026" font-size="12" font-weight="bold" fill="#1e40af">⑧ BuildDynamicMeshFromGPUVineOutput</text>
  <text x="80" y="1043" font-size="10" fill="#334155">OutVertices (float4 → FVector3d) + OutIndices (uint32 triplets) → FDynamicMesh3</text>
  <text x="80" y="1059" font-size="10" fill="#334155">RecomputeNormals, set MaterialID = MainVine ? 0 : 1</text>
  <text x="80" y="1072" font-size="9" fill="#6b7280">Validates: skip degenerate triangles, check vertex count matches</text>

  <line x1="550" y1="1076" x2="550" y2="1091" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- STEP 9: Append to Container -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="1094" width="980" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="80" y="1114" font-size="12" font-weight="bold" fill="#1e40af">⑨ Append to ContainerMesh + Assign MaterialID</text>
  <text x="80" y="1131" font-size="10" fill="#334155">AppendMesh(ContainerMesh, VineMesh) → EditMesh: set MaterialID for new triangles</text>
  <text x="80" y="1148" font-size="10" fill="#334155">NotifyMeshUpdated() + UpdateBounds()</text>
  <text x="80" y="1160" font-size="9" fill="#6b7280">MaterialID 0 = Tube vine material, MaterialID 1 = Plane vine material</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- Output -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <line x1="550" y1="1164" x2="550" y2="1185" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="300" y="1188" width="500" height="40" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="550" y="1212" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">✓ DynamicMeshComponent Updated (return true)</text>

  <!-- ══════════════════════════════════════════════════════════════════ -->
  <!-- Comparison box -->
  <!-- ══════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="1250" width="980" height="250" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="1275" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">VisVineGPU vs VisVine (CPU) — Key Differences</text>

  <line x1="550" y1="1285" x2="550" y2="1490" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Left: GPU -->
  <text x="300" y="1305" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">VisVineGPU</text>
  <text x="80" y="1325" font-size="10" fill="#334155">• Noise + surface snap: NOT done (CPU prep only smooths)</text>
  <text x="80" y="1343" font-size="10" fill="#334155">• Nearest-surface: GPU brute-force triangle search</text>
  <text x="80" y="1361" font-size="10" fill="#334155">• Sweep extrusion: GPU parallel per-vertex</text>
  <text x="80" y="1379" font-size="10" fill="#334155">• Index generation: GPU parallel per-segment</text>
  <text x="80" y="1397" font-size="10" fill="#334155">• Merge sections: NOT done (simpler output)</text>
  <text x="80" y="1415" font-size="10" fill="#334155">• Single dispatch: O(max(N_pts, N_seg)) threads</text>
  <text x="80" y="1433" font-size="10" fill="#334155">• Readback cost: 2 buffer locks</text>
  <text x="80" y="1455" font-size="10" font-weight="bold" fill="#16a34a">Best for: large vine counts, real-time preview</text>

  <!-- Right: CPU -->
  <text x="820" y="1305" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">VisVine (CPU)</text>
  <text x="570" y="1325" font-size="10" fill="#334155">• 10× iterative noise + BVH snap per vertex</text>
  <text x="570" y="1343" font-size="10" fill="#334155">• Nearest-surface: BVH spatial query (accurate)</text>
  <text x="570" y="1361" font-size="10" fill="#334155">• Sweep: GeometryScript AppendSweepPolyline</text>
  <text x="570" y="1379" font-size="10" fill="#334155">• Full UV parameterization (arc-length V)</text>
  <text x="570" y="1397" font-size="10" fill="#334155">• Merge sections: Lerp toward shared points</text>
  <text x="570" y="1415" font-size="10" fill="#334155">• Sequential: O(N_pts × 10 × BVH_query)</text>
  <text x="570" y="1433" font-size="10" fill="#334155">• No readback (all CPU memory)</text>
  <text x="570" y="1455" font-size="10" font-weight="bold" fill="#2563eb">Best for: final quality, organic detail</text>

  <!-- Dispatch detail -->
  <text x="550" y="1490" text-anchor="middle" font-size="9" fill="#6b7280">Dispatch: FComputeShaderUtils::Dispatch(CS, max(OutputVertexCount, SegmentCount), 1, 1) / GroupSize=64</text>
</svg>
