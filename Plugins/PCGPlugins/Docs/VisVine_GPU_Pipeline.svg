<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" font-family="Consolas, monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">VisVine GPU Pipeline (SpaceColonizationCS → Mesh)</text>
  <text x="600" y="55" text-anchor="middle" font-size="13" fill="#64748b">AVineContainer::VisVine(false) — PlaneLines GPU Path</text>

  <!-- Legend -->
  <rect x="30" y="70" width="16" height="16" rx="3" fill="#22c55e" opacity="0.3" stroke="#16a34a"/>
  <text x="52" y="83" font-size="11" fill="#333">GPU Compute Shader</text>
  <rect x="180" y="70" width="16" height="16" rx="3" fill="#3b82f6" opacity="0.3" stroke="#2563eb"/>
  <text x="202" y="83" font-size="11" fill="#333">CPU Game Thread</text>
  <rect x="340" y="70" width="16" height="16" rx="3" fill="#f59e0b" opacity="0.3" stroke="#d97706"/>
  <text x="362" y="83" font-size="11" fill="#333">GPU Readback</text>
  <rect x="500" y="70" width="16" height="16" rx="3" fill="#8b5cf6" opacity="0.3" stroke="#7c3aed"/>
  <text x="522" y="83" font-size="11" fill="#333">Geometry Script (CPU)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 1: SpaceColonizationCS (GPU) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="100" width="1100" height="520" rx="8" fill="url(#gpuGrad)" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="70" y="120" font-size="14" font-weight="bold" fill="#16a34a">PHASE 1: SpaceColonizationCS (GPU Compute)</text>
  <text x="70" y="138" font-size="11" fill="#4b5563">BuildSpaceColonizationQueueCSImpl() → 6 dispatch passes on RDG</text>

  <!-- Input buffers -->
  <rect x="80" y="155" width="220" height="60" rx="5" fill="#fff" stroke="#16a34a" stroke-width="1.2"/>
  <text x="190" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">Input Buffers</text>
  <text x="190" y="192" text-anchor="middle" font-size="10" fill="#333">SourcePositions[N_src] (float4)</text>
  <text x="190" y="205" text-anchor="middle" font-size="10" fill="#333">InitialTargetPositions[N_tgt] (float4)</text>

  <!-- Pass 1: Init -->
  <rect x="380" y="150" width="200" height="45" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="480" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Pass 1: Init</text>
  <text x="480" y="185" text-anchor="middle" font-size="10" fill="#333">Copy targets → RW_TargetPositions</text>
  <text x="480" y="197" text-anchor="middle" font-size="9" fill="#6b7280">Clear State0, State1 buffers</text>

  <!-- Pass 2: MarkSources -->
  <rect x="380" y="210" width="200" height="45" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="480" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Pass 2: MarkSources</text>
  <text x="480" y="245" text-anchor="middle" font-size="10" fill="#333">Find nearest target per source</text>
  <text x="480" y="257" text-anchor="middle" font-size="9" fill="#6b7280">Mark as Startpt in State0</text>

  <!-- Pass 3: BuildNeighbors -->
  <rect x="380" y="270" width="200" height="45" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="480" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Pass 3: BuildNeighbors</text>
  <text x="480" y="305" text-anchor="middle" font-size="10" fill="#333">N² brute-force within radius</text>
  <text x="480" y="317" text-anchor="middle" font-size="9" fill="#6b7280">NeighborCounts + NeighborIndices</text>

  <!-- Iteration loop -->
  <rect x="340" y="335" width="500" height="170" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-dasharray="3,2"/>
  <text x="360" y="355" font-size="11" font-weight="bold" fill="#15803d">for (iter = 0; iter &lt; Iterations; iter++)</text>

  <!-- Pass 4: ResetProposals -->
  <rect x="370" y="365" width="190" height="40" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="465" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Pass 4: ResetProposals</text>
  <text x="465" y="396" text-anchor="middle" font-size="9" fill="#333">Clear ProposalOwners = 0xFFFF</text>

  <!-- Pass 5: Propose -->
  <rect x="370" y="415" width="190" height="50" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="465" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Pass 5: Propose</text>
  <text x="465" y="445" text-anchor="middle" font-size="9" fill="#333">Active nodes grow toward</text>
  <text x="465" y="457" text-anchor="middle" font-size="9" fill="#333">nearest attractor neighbor</text>

  <!-- Pass 6: Commit -->
  <rect x="600" y="415" width="190" height="50" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="695" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Pass 6: Commit</text>
  <text x="695" y="445" text-anchor="middle" font-size="9" fill="#333">Accept proposals, update</text>
  <text x="695" y="457" text-anchor="middle" font-size="9" fill="#333">State0/State1, move targets</text>

  <!-- Arrows inside iteration -->
  <line x1="560" y1="435" x2="598" y2="435" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="465" y1="405" x2="465" y2="413" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Output: Readback -->
  <rect x="380" y="520" width="350" height="50" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="555" y="540" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">GPU → CPU Readback</text>
  <text x="555" y="555" text-anchor="middle" font-size="10" fill="#333">TargetPositions (float4×N) + State0 (int4×N) + State1 (int4×N)</text>
  <text x="555" y="568" text-anchor="middle" font-size="9" fill="#6b7280">FlushRenderingCommands() → Lock → Memcpy → Unlock</text>

  <!-- Arrows Phase 1 -->
  <line x1="300" y1="185" x2="378" y2="172" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="195" x2="480" y2="208" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="255" x2="480" y2="268" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="315" x2="480" y2="333" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="555" y1="505" x2="555" y2="518" stroke="#d97706" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 2: BuildLines (CPU) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="640" width="1100" height="130" rx="8" fill="url(#cpuGrad)" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="70" y="660" font-size="14" font-weight="bold" fill="#2563eb">PHASE 2: BuildSpaceColonizationLinesImpl (CPU)</text>

  <rect x="80" y="675" width="300" height="75" rx="5" fill="#fff" stroke="#2563eb"/>
  <text x="230" y="695" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Trace Back from End Nodes</text>
  <text x="230" y="712" text-anchor="middle" font-size="10" fill="#333">For each End node: follow PrePt chain</text>
  <text x="230" y="726" text-anchor="middle" font-size="10" fill="#333">→ collect positions into PolyPath</text>
  <text x="230" y="740" text-anchor="middle" font-size="10" fill="#333">→ stop at BackGrowCount limit</text>

  <rect x="440" y="675" width="250" height="75" rx="5" fill="#fff" stroke="#2563eb"/>
  <text x="565" y="695" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Output</text>
  <text x="565" y="712" text-anchor="middle" font-size="10" fill="#333">TArray&lt;FGeometryScriptPolyPath&gt;</text>
  <text x="565" y="726" text-anchor="middle" font-size="10" fill="#333">= PlaneLines (stored on Container)</text>
  <text x="565" y="740" text-anchor="middle" font-size="9" fill="#6b7280">Each path = one vine branch</text>

  <line x1="380" y1="712" x2="438" y2="712" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow from Phase 1 to Phase 2 -->
  <line x1="555" y1="570" x2="555" y2="590" stroke="#333" stroke-width="1.5"/>
  <line x1="555" y1="590" x2="230" y2="590" stroke="#333" stroke-width="1.5"/>
  <line x1="230" y1="590" x2="230" y2="638" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PHASE 3: VisVine (CPU - Geometry Processing) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="790" width="1100" height="980" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="70" y="812" font-size="14" font-weight="bold" fill="#7c3aed">PHASE 3: VisVine(false) — Plane Mesh Generation (CPU)</text>

  <!-- Step 1: Smooth + Resample -->
  <rect x="80" y="830" width="480" height="70" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="850" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.1 Smooth &amp; Resample</text>
  <text x="320" y="867" text-anchor="middle" font-size="10" fill="#333">SmoothLine(3) → ResampleByLength(VV.ResampleLength)</text>
  <text x="320" y="882" text-anchor="middle" font-size="10" fill="#333">Filter: skip lines with ArcLength &lt; 2 × ResampleLength</text>
  <text x="320" y="895" text-anchor="middle" font-size="9" fill="#6b7280">Converts raw SC output into uniform-spaced polylines</text>

  <!-- Step 2: Noise + Snap -->
  <rect x="80" y="915" width="480" height="85" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="935" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.2 Iterative Noise + Surface Snap (×10)</text>
  <text x="320" y="952" text-anchor="middle" font-size="10" fill="#333">For each iteration:</text>
  <text x="320" y="967" text-anchor="middle" font-size="10" fill="#333">  ① FindNearestPointOnMesh (snap to BVH surface)</text>
  <text x="320" y="982" text-anchor="middle" font-size="10" fill="#333">  ② CurlNoise + PerlinNoise offset (controlled by CurveControl.R)</text>
  <text x="320" y="995" text-anchor="middle" font-size="9" fill="#6b7280">  ③ ResampleByLength (maintain uniform spacing)</text>

  <!-- Step 3: Merge Sections -->
  <rect x="80" y="1015" width="480" height="70" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="1035" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.3 Merge Nearby Vine Sections</text>
  <text x="320" y="1052" text-anchor="middle" font-size="10" fill="#333">Collect 80% of all path points → random subsample</text>
  <text x="320" y="1067" text-anchor="middle" font-size="10" fill="#333">Lerp vertices toward nearest sample (PerlinNoise × CurveControl.B)</text>
  <text x="320" y="1080" text-anchor="middle" font-size="9" fill="#6b7280">Creates organic clustering where vines converge</text>

  <!-- Step 4: Surface Snap + Offset -->
  <rect x="80" y="1100" width="480" height="70" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="1120" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.4 Final Surface Snap + Normal Offset</text>
  <text x="320" y="1137" text-anchor="middle" font-size="10" fill="#333">FindNearestPointOnMesh → snap back to surface</text>
  <text x="320" y="1152" text-anchor="middle" font-size="10" fill="#333">Offset along triangle normal by VV.VinesOffset</text>
  <text x="320" y="1165" text-anchor="middle" font-size="9" fill="#6b7280">Ensures vines sit on top of collision mesh</text>

  <!-- Step 5: Calculate Transforms -->
  <rect x="80" y="1185" width="480" height="70" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="1205" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.5 Calculate Sweep Transforms</text>
  <text x="320" y="1222" text-anchor="middle" font-size="10" fill="#333">Per vertex: Tangent = CurveUtil::Tangent, Normal = TriNormal</text>
  <text x="320" y="1237" text-anchor="middle" font-size="10" fill="#333">FTransform(MakeFromXZ(Tangent, Normal), Position, Scale)</text>
  <text x="320" y="1250" text-anchor="middle" font-size="9" fill="#6b7280">Scale from CurveControl.G (taper along vine length)</text>

  <!-- Step 6: Sweep Polyline -->
  <rect x="80" y="1270" width="480" height="70" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="320" y="1290" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.6 AppendSweepPolyline</text>
  <text x="320" y="1307" text-anchor="middle" font-size="10" fill="#333">Cross-section: Line2D = [-5, 0] → [+5, 0] × LineScale</text>
  <text x="320" y="1322" text-anchor="middle" font-size="10" fill="#333">Sweep along Transforms → flat ribbon mesh</text>
  <text x="320" y="1335" text-anchor="middle" font-size="9" fill="#6b7280">UV: U from Line2D, V from CurveU (arc-length parameterized)</text>

  <!-- Step 7: Output -->
  <rect x="80" y="1360" width="480" height="55" rx="5" fill="#fff" stroke="#7c3aed"/>
  <text x="320" y="1380" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">3.7 Append to ContainerMesh</text>
  <text x="320" y="1397" text-anchor="middle" font-size="10" fill="#333">RecomputeNormals → AppendMesh → Set MaterialID = 1</text>
  <text x="320" y="1410" text-anchor="middle" font-size="9" fill="#6b7280">Material slot 1 = plane vine material (separate from tube vines)</text>

  <!-- Arrows Phase 3 -->
  <line x1="320" y1="900" x2="320" y2="913" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="1000" x2="320" y2="1013" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="1085" x2="320" y2="1098" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="1170" x2="320" y2="1183" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="1255" x2="320" y2="1268" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="1340" x2="320" y2="1358" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow from Phase 2 to Phase 3 -->
  <line x1="565" y1="750" x2="565" y2="770" stroke="#333" stroke-width="1.5"/>
  <line x1="565" y1="770" x2="320" y2="770" stroke="#333" stroke-width="1.5"/>
  <line x1="320" y1="770" x2="320" y2="828" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right side: Data flow annotations -->
  <rect x="620" y="830" width="500" height="580" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="855" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">Key Data Structures</text>

  <text x="640" y="885" font-size="11" font-weight="bold" fill="#1e293b">GPU Buffers (Phase 1):</text>
  <text x="640" y="905" font-size="10" fill="#333">• TargetPositions: float4[N_tgt] — current positions</text>
  <text x="640" y="920" font-size="10" fill="#333">• State0: int4[N_tgt] — {Attractor, End, Startpt, SpawnCount}</text>
  <text x="640" y="935" font-size="10" fill="#333">• State1: int4[N_tgt] — {Startid, PrePt, NextPt, BranchCount}</text>
  <text x="640" y="950" font-size="10" fill="#333">• NeighborIndices: uint[N×MaxNeighbors] — spatial graph</text>
  <text x="640" y="965" font-size="10" fill="#333">• ProposalOwners/Positions: growth proposals per iter</text>

  <text x="640" y="995" font-size="11" font-weight="bold" fill="#1e293b">CPU Output (Phase 2):</text>
  <text x="640" y="1015" font-size="10" fill="#333">• OutTargetLocations: FVector[N_tgt]</text>
  <text x="640" y="1030" font-size="10" fill="#333">• OutSCAttributes: {PrePt, NextPt, End, Startid, ...}[N_tgt]</text>
  <text x="640" y="1045" font-size="10" fill="#333">• PlaneLines: TArray&lt;FGeometryScriptPolyPath&gt;</text>

  <text x="640" y="1075" font-size="11" font-weight="bold" fill="#1e293b">VisVine Parameters (VV struct):</text>
  <text x="640" y="1095" font-size="10" fill="#333">• ResampleLength — uniform vertex spacing</text>
  <text x="640" y="1110" font-size="10" fill="#333">• CurlNoiseScale / CurlNoiseFre — curl noise</text>
  <text x="640" y="1125" font-size="10" fill="#333">• PerlinNoiseScale / PerlinNoiseFre — perlin offset</text>
  <text x="640" y="1140" font-size="10" fill="#333">• VinesOffset — normal offset from surface</text>
  <text x="640" y="1155" font-size="10" fill="#333">• LineScale — cross-section width</text>
  <text x="640" y="1170" font-size="10" fill="#333">• CircleScale — tube cross-section (MainVine only)</text>
  <text x="640" y="1185" font-size="10" fill="#333">• MergeDistMult — vine clustering distance</text>
  <text x="640" y="1200" font-size="10" fill="#333">• CurveControl (UCurveLinearColor):</text>
  <text x="660" y="1215" font-size="10" fill="#6b7280">  R = PerlinNoise envelope along vine</text>
  <text x="660" y="1230" font-size="10" fill="#6b7280">  G = Sweep scale (taper) along vine</text>
  <text x="660" y="1245" font-size="10" fill="#6b7280">  B = Merge lerp strength</text>

  <text x="640" y="1275" font-size="11" font-weight="bold" fill="#1e293b">SC Parameters:</text>
  <text x="640" y="1295" font-size="10" fill="#333">• Iteration — growth steps (GPU dispatches)</text>
  <text x="640" y="1310" font-size="10" fill="#333">• Activetime — delay before node can grow</text>
  <text x="640" y="1325" font-size="10" fill="#333">• RandGrow — random skip probability</text>
  <text x="640" y="1340" font-size="10" fill="#333">• Seed — random seed for GPU noise</text>
  <text x="640" y="1355" font-size="10" fill="#333">• InfluenceRadius — neighbor search radius</text>
  <text x="640" y="1370" font-size="10" fill="#333">• BackGrowCount = 12 (PlaneLines)</text>
  <text x="640" y="1385" font-size="10" fill="#333">• BackGrowCount = 5 (TubeLines)</text>

  <!-- Performance note -->
  <rect x="80" y="1440" width="1040" height="60" rx="5" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="600" y="1462" text-anchor="middle" font-size="11" font-weight="bold" fill="#854d0e">Performance: GPU vs CPU</text>
  <text x="600" y="1480" text-anchor="middle" font-size="10" fill="#333">GPU (SpaceColonizationCS): O(Iterations × N_tgt) parallel — neighbor graph built once, proposals/commits per iteration</text>
  <text x="600" y="1495" text-anchor="middle" font-size="10" fill="#333">CPU (SpaceColonization): O(Iterations × N_tgt²) — brute-force nearest-point per iteration per node</text>

  <!-- Final output box -->
  <rect x="300" y="1520" width="600" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="600" y="1545" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Final Output: DynamicMeshComponent (Swept Ribbon Mesh)</text>
  <text x="600" y="1562" text-anchor="middle" font-size="10" fill="#333">MaterialID=0 (TubeVines, swept polygon) + MaterialID=1 (PlaneVines, swept polyline)</text>

  <line x1="320" y1="1415" x2="320" y2="1430" stroke="#7c3aed" stroke-width="1"/>
  <line x1="320" y1="1430" x2="600" y2="1430" stroke="#333" stroke-width="1.5"/>
  <line x1="600" y1="1430" x2="600" y2="1518" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
